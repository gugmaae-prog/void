<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aether</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #000000;
      --void-soft: #050508;
      --void-deep: #090713;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.075);
      --surface-strong: rgba(255,255,255,0.09);
      --border: rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.16);
      --border-glow: rgba(183,156,255,0.22);
      --text: rgba(255,255,255,0.9);
      --text-soft: rgba(255,255,255,0.72);
      --text-dim: rgba(255,255,255,0.38);
      --text-ghost: rgba(255,255,255,0.16);
      --accent: rgba(255,255,255,0.94);
      --accent-violet: rgba(183,156,255,0.9);
      --accent-cyan: rgba(132, 221, 255, 0.75);
      --font-display: 'Cormorant', Georgia, serif;
      --font-mono: 'DM Mono', monospace;
      --blur: blur(22px);
      --radius: 3px;
      --panel-w: 360px;
      --ease: cubic-bezier(0.23, 1, 0.32, 1);
      --shadow-soft: 0 10px 40px rgba(0,0,0,0.35);
      --shadow-glow: 0 0 0 1px rgba(255,255,255,0.02), 0 0 40px rgba(183,156,255,0.05);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.03), transparent 28%),
        radial-gradient(circle at 50% 55%, rgba(140,120,255,0.05), transparent 42%),
        linear-gradient(180deg, #020204 0%, #000000 40%, #04040a 100%);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 20% 15%, rgba(132,221,255,0.04), transparent 24%),
        radial-gradient(circle at 80% 22%, rgba(183,156,255,0.06), transparent 28%),
        radial-gradient(circle at 50% 100%, rgba(255,255,255,0.02), transparent 35%);
      mix-blend-mode: screen;
      animation: ambientDrift 18s ease-in-out infinite alternate;
    }

    @keyframes ambientDrift {
      from { transform: translate3d(0, 0, 0) scale(1); opacity: 0.75; }
      to   { transform: translate3d(0, -10px, 0) scale(1.02); opacity: 1; }
    }

    /* ── Canvas ── */
    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Starfield overlay ── */
    #aetherStars,
    #aetherStars2,
    #aetherNebula {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #aetherNebula {
      z-index: 1;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.02), transparent 16%),
        radial-gradient(circle at 30% 30%, rgba(132,221,255,0.03), transparent 28%),
        radial-gradient(circle at 70% 65%, rgba(183,156,255,0.04), transparent 28%);
      filter: blur(24px);
      opacity: 0.85;
      animation: nebulaPulse 14s ease-in-out infinite alternate;
    }

    #aetherStars,
    #aetherStars2 {
      z-index: 2;
      overflow: hidden;
    }

    #aetherStars::before,
    #aetherStars2::before {
      content: "";
      position: absolute;
      inset: -25%;
      background-repeat: repeat;
      background-size: 540px 540px;
      opacity: calc(0.75 + (var(--star-density, 1) - 1) * 0.35);
      transform-origin: center;
      will-change: transform, opacity;
    }

    #aetherStars::before {
      background-image:
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.95) 98%, transparent 100%),
        radial-gradient(1px 1px at 90px 130px, rgba(255,255,255,0.55) 98%, transparent 100%),
        radial-gradient(1.4px 1.4px at 170px 70px, rgba(183,156,255,0.65) 98%, transparent 100%),
        radial-gradient(1px 1px at 260px 180px, rgba(255,255,255,0.8) 98%, transparent 100%),
        radial-gradient(1.2px 1.2px at 360px 100px, rgba(132,221,255,0.7) 98%, transparent 100%),
        radial-gradient(1px 1px at 430px 220px, rgba(255,255,255,0.7) 98%, transparent 100%),
        radial-gradient(1.5px 1.5px at 500px 80px, rgba(255,255,255,0.85) 98%, transparent 100%),
        radial-gradient(1px 1px at 140px 280px, rgba(255,255,255,0.65) 98%, transparent 100%),
        radial-gradient(1.3px 1.3px at 280px 310px, rgba(183,156,255,0.6) 98%, transparent 100()),
        radial-gradient(1px 1px at 420px 360px, rgba(255,255,255,0.75) 98%, transparent 100()),
        radial-gradient(1.1px 1.1px at 120px 440px, rgba(132,221,255,0.55) 98%, transparent 100()),
        radial-gradient(1px 1px at 330px 470px, rgba(255,255,255,0.6) 98%, transparent 100());
      animation: starDrift 180s linear infinite, starTwinkle 8s ease-in-out infinite alternate;
    }

    #aetherStars2::before {
      background-size: 700px 700px;
      background-image:
        radial-gradient(1.8px 1.8px at 40px 50px, rgba(255,255,255,0.7) 98%, transparent 100%),
        radial-gradient(1.2px 1.2px at 180px 180px, rgba(255,255,255,0.45) 98%, transparent 100%),
        radial-gradient(2px 2px at 300px 120px, rgba(183,156,255,0.45) 98%, transparent 100%),
        radial-gradient(1.6px 1.6px at 460px 250px, rgba(132,221,255,0.45) 98%, transparent 100%),
        radial-gradient(1.2px 1.2px at 610px 90px, rgba(255,255,255,0.52) 98%, transparent 100()),
        radial-gradient(1.6px 1.6px at 580px 560px, rgba(255,255,255,0.38) 98%, transparent 100()),
        radial-gradient(1.8px 1.8px at 90px 620px, rgba(183,156,255,0.36) 98%, transparent 100());
      opacity: 0.55;
      animation: starDriftReverse 240s linear infinite, starTwinkle 11s ease-in-out infinite alternate-reverse;
      filter: blur(0.2px);
    }

    @keyframes starDrift {
      from { transform: translate3d(0, 0, 0) scale(1); }
      to   { transform: translate3d(-140px, -220px, 0) scale(1.05); }
    }

    @keyframes starDriftReverse {
      from { transform: translate3d(0, 0, 0) scale(1.02); }
      to   { transform: translate3d(160px, 180px, 0) scale(1.08); }
    }

    @keyframes starTwinkle {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 0.95; }
    }

    @keyframes nebulaPulse {
      0% { opacity: 0.5; transform: scale(1); }
      100% { opacity: 0.95; transform: scale(1.06); }
    }

    /* ── Shared overlay layer ── */
    .overlay {
      position: fixed;
      z-index: 10;
      pointer-events: none;
    }
    .overlay * { pointer-events: auto; }

    /* ── Top-left identity ── */
    #aetherIdentity {
      top: 28px; left: 32px;
      display: flex; flex-direction: column; gap: 10px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.05);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      border-radius: 6px;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      box-shadow: var(--shadow-soft), var(--shadow-glow);
    }

    .aether-brand {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.82);
      line-height: 1;
      user-select: none;
      text-shadow: 0 0 18px rgba(255,255,255,0.08), 0 0 28px rgba(183,156,255,0.04);
    }

    #aetherEmotion {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-dim);
      line-height: 1;
      transition: color 1.2s ease, letter-spacing 0.8s ease, opacity 0.8s ease;
    }

    #aetherIdentityStats {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: -2px;
    }

    .aether-stat {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.34);
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 6px;
      min-width: 84px;
    }

    .aether-stat strong {
      display: block;
      color: rgba(255,255,255,0.8);
      font-weight: 400;
      font-size: 10px;
      letter-spacing: 0.12em;
      margin-top: 4px;
    }

    #aetherPersonalityBadge {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 2px;
    }
    .aether-trait-chip {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 8px;
      background: rgba(255,255,255,0.025);
      transition: color 0.4s, border-color 0.4s, background 0.4s;
    }
    .aether-trait-chip:hover {
      color: rgba(255,255,255,0.75);
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.06);
    }

    /* ── Top-right controls ── */
    #aetherControls {
      top: 28px; right: 32px;
      display: flex; gap: 8px; align-items: center;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      background: rgba(7,7,10,0.48);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      box-shadow: var(--shadow-soft);
    }

    .aether-ctrl-btn {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.025));
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      transition: color 0.25s, border-color 0.25s, background 0.25s, transform 0.25s, box-shadow 0.25s;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .aether-ctrl-btn:hover {
      color: var(--text);
      border-color: var(--border-bright);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      transform: translateY(-1px);
    }
    .aether-ctrl-btn.active {
      color: var(--accent);
      border-color: rgba(255,255,255,0.22);
      background: linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
      box-shadow: 0 0 24px rgba(183,156,255,0.08);
    }

    /* ── Upload absorption reaction ── */
    #aetherUploadReaction {
      position: fixed;
      z-index: 20;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.92);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s var(--ease), transform 0.35s var(--ease);
      text-align: center;
      padding: 18px 22px;
      border-radius: 10px;
      background: rgba(8,8,14,0.52);
      border: 1px solid rgba(183,156,255,0.14);
      box-shadow: 0 0 48px rgba(183,156,255,0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    #aetherUploadReaction.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .aether-upload-label {
      font-family: var(--font-display);
      font-size: 18px;
      font-style: italic;
      font-weight: 300;
      color: rgba(183, 156, 255, 0.9);
      letter-spacing: 0.06em;
      text-shadow: 0 0 20px rgba(183,156,255,0.18);
    }
    .aether-upload-label strong { font-weight: 400; color: rgba(255,255,255,0.92); }

    /* ── Speech output ── */
    #aetherSpeech {
      position: fixed;
      z-index: 15;
      top: 50%; left: 50%;
      transform: translate(-50%, calc(-50% - 24px));
      max-width: 620px;
      width: min(92%, 620px);
      text-align: center;
      font-family: var(--font-display);
      font-size: clamp(20px, 2.2vw, 28px);
      font-style: italic;
      font-weight: 300;
      line-height: 1.55;
      color: rgba(255,255,255,0.8);
      letter-spacing: 0.035em;
      pointer-events: none;
      opacity: 0;
      padding: 20px 28px;
      border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 0 40px rgba(0,0,0,0.24);
      transition: opacity 0.55s ease, transform 0.55s var(--ease), filter 0.55s ease;
      filter: blur(6px);
      text-wrap: pretty;
    }
    #aetherSpeech.visible {
      opacity: 1;
      transform: translate(-50%, -50%);
      filter: blur(0px);
    }

    /* ── Loading indicator ── */
    #aetherLoading {
      position: fixed;
      z-index: 20;
      bottom: 112px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      align-items: center;
      gap: 7px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 999px;
      background: rgba(8,8,12,0.62);
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      pointer-events: none;
    }
    .aether-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.42);
      box-shadow: 0 0 12px rgba(255,255,255,0.25);
      animation: aetherPulse 1.1s ease-in-out infinite;
    }
    .aether-dot:nth-child(2) { animation-delay: 0.18s; }
    .aether-dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes aetherPulse {
      0%, 100% { opacity: 0.25; transform: scale(1); }
      50%       { opacity: 1;    transform: scale(1.45); }
    }

    /* ── Bottom composer ── */
    #aetherComposer {
      bottom: 0; left: 0; right: 0;
      padding: 0 0 30px;
      display: flex;
      justify-content: center;
    }

    .aether-composer-inner {
      width: min(760px, calc(100% - 40px));
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background:
        linear-gradient(180deg, rgba(10,10,12,0.78), rgba(7,7,9,0.72));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 12px 12px 12px 16px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s, background 0.3s;
      box-shadow: 0 18px 60px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .aether-composer-inner:focus-within {
      border-color: rgba(255,255,255,0.16);
      background: linear-gradient(180deg, rgba(11,11,15,0.84), rgba(8,8,12,0.8));
      box-shadow: 0 20px 80px rgba(0,0,0,0.48), 0 0 0 1px rgba(183,156,255,0.05);
      transform: translateY(-2px);
    }

    #aetherInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 300;
      line-height: 1.65;
      letter-spacing: 0.02em;
      min-height: 22px;
      max-height: 144px;
      overflow-y: auto;
      scrollbar-width: none;
      caret-color: rgba(255,255,255,0.7);
      padding: 5px 2px 4px;
    }
    #aetherInput::-webkit-scrollbar { display: none; }
    #aetherInput::placeholder {
      color: var(--text-ghost);
      font-style: italic;
    }

    .aether-icon-btn {
      flex-shrink: 0;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.02);
      border: 1px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      color: var(--text-dim);
      transition: color 0.22s, border-color 0.22s, background 0.22s, transform 0.22s, box-shadow 0.22s;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .aether-icon-btn:hover {
      color: var(--text);
      border-color: rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.06);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    }
    .aether-icon-btn.active {
      color: rgba(183,156,255,0.95);
      border-color: rgba(183,156,255,0.2);
      box-shadow: 0 0 22px rgba(183,156,255,0.08);
    }
    .aether-icon-btn svg {
      width: 15px; height: 15px;
      stroke: currentColor;
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    #aetherSend {
      width: 40px; height: 40px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      color: var(--text-dim);
      transition: all 0.25s var(--ease);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }
    #aetherSend svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      stroke-width: 1.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      transform: translateX(1px);
    }
    #aetherSend.ready {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(230,230,235,0.94));
      border-color: transparent;
      color: #000;
      box-shadow: 0 12px 30px rgba(255,255,255,0.14);
    }
    #aetherSend:hover { opacity: 0.88; transform: translateY(-1px); }

    #aetherFileInput { display: none; }

    /* ── Vault panel ── */
    #aetherVault {
      position: fixed;
      z-index: 30;
      top: 0; right: 0;
      width: var(--panel-w);
      height: 100%;
      background:
        linear-gradient(180deg, rgba(7,7,9,0.96), rgba(5,5,7,0.94));
      border-left: 1px solid rgba(255,255,255,0.08);
      box-shadow: -24px 0 60px rgba(0,0,0,0.32);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.5s var(--ease), box-shadow 0.5s var(--ease);
      pointer-events: none;
    }
    #aetherVault.open {
      transform: translateX(0);
      pointer-events: auto;
    }

    .aether-vault-header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    }

    .aether-vault-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .aether-vault-title {
      font-family: var(--font-display);
      font-size: 17px;
      font-style: italic;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.06em;
    }
    #aetherVaultClose {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1;
      transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.2s;
    }
    #aetherVaultClose:hover {
      color: var(--text);
      border-color: var(--border-bright);
      background: rgba(255,255,255,0.06);
      transform: translateY(-1px);
    }

    #aetherVaultSearch {
      width: 100%;
      background: rgba(255,255,255,0.035);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    #aetherVaultSearch::placeholder { color: var(--text-ghost); font-style: italic; }
    #aetherVaultSearch:focus {
      border-color: rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 0 3px rgba(183,156,255,0.04);
    }

    .aether-tabs {
      display: flex;
      gap: 4px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }
    .aether-tabs::-webkit-scrollbar { display: none; }
    .aether-tab {
      font-family: var(--font-mono);
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: rgba(255,255,255,0.02);
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.2s;
    }
    .aether-tab:hover {
      color: var(--text);
      border-color: var(--border);
      transform: translateY(-1px);
    }
    .aether-tab.active {
      color: var(--accent);
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.07);
    }

    #aetherVaultList {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.08) transparent;
    }
    #aetherVaultList::-webkit-scrollbar { width: 4px; }
    #aetherVaultList::-webkit-scrollbar-track { background: transparent; }
    #aetherVaultList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 99px; }

    .aether-empty {
      padding: 38px 18px;
      text-align: center;
      font-family: var(--font-display);
      font-style: italic;
      font-size: 15px;
      color: var(--text-ghost);
      letter-spacing: 0.04em;
      opacity: 0.9;
    }

    .aether-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 12px 13px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.2s, background 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: cardIn 0.28s var(--ease) both;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .aether-card:hover {
      border-color: rgba(255,255,255,0.14);
      background: linear-gradient(180deg, rgba(255,255,255,0.065), rgba(255,255,255,0.03));
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.16);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .aether-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .aether-chip {
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 3px 7px;
      border-radius: 999px;
      border: 1px solid;
      background: rgba(255,255,255,0.02);
    }
    .type-whisper        { color: rgba(160,210,255,0.8); border-color: rgba(160,210,255,0.2); }
    .type-knowledge      { color: rgba(180,255,200,0.8); border-color: rgba(180,255,200,0.2); }
    .type-reflection     { color: rgba(255,210,160,0.8); border-color: rgba(255,210,160,0.2); }
    .type-morph_target   { color: rgba(200,160,255,0.8); border-color: rgba(200,160,255,0.2); }
    .type-autonomous_thought { color: rgba(255,180,220,0.8); border-color: rgba(255,180,220,0.2); }

    .aether-time {
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--text-ghost);
      flex-shrink: 0;
    }

    .aether-card-text {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 300;
      line-height: 1.65;
      color: rgba(255,255,255,0.58);
      letter-spacing: 0.015em;
      word-break: break-word;
      text-wrap: pretty;
    }

    /* ── Viewport edge glow vignette ── */
    #aetherVignette {
      position: fixed;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      background:
        radial-gradient(ellipse 75% 60% at 50% 50%, transparent 36%, rgba(0,0,0,0.2) 72%, rgba(0,0,0,0.72) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.2), transparent 20%, transparent 78%, rgba(0,0,0,0.25));
    }

    /* ── Bottom fade ── */
    #aetherBottomGlow {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(820px, 90vw);
      height: 170px;
      z-index: 4;
      pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(183,156,255,0.08), rgba(132,221,255,0.04) 26%, transparent 70%);
      filter: blur(18px);
      opacity: 0.9;
    }

    /* Minimal UI mode requested */
    #aetherIdentity {
      display: none !important;
    }

    .aether-composer-inner {
      background: rgba(8, 8, 12, 0.38);
      border-color: rgba(255,255,255,0.05);
      box-shadow: 0 16px 50px rgba(0,0,0,0.36);
    }

    .aether-card {
      border-radius: 8px;
      border-color: rgba(255,255,255,0.04);
      background: rgba(255,255,255,0.015);
      box-shadow: none;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      :root { --panel-w: 100%; }
      #aetherIdentity { top: 16px; left: 16px; right: 16px; width: auto; }
      #aetherControls { top: auto; right: 16px; left: 16px; bottom: 102px; justify-content: flex-end; }
      #aetherComposer { padding: 0 0 18px; }
      .aether-composer-inner { width: calc(100% - 20px); border-radius: 16px; }
      #aetherVault { width: 100%; }
      .aether-brand { font-size: 20px; }
      #aetherSpeech { width: calc(100% - 32px); padding: 16px 18px; }
      #aetherLoading { bottom: 90px; }
      #aetherIdentityStats { gap: 8px; }
      .aether-stat { min-width: 68px; }
    }
  </style>
</head>
<body>

  <!-- Canvas -->
  <div id="canvas-container"></div>

  <!-- Stars / nebula -->
  <div id="aetherNebula"></div>
  <div id="aetherStars"></div>
  <div id="aetherStars2"></div>

  <!-- Vignette -->
  <div id="aetherVignette"></div>
  <div id="aetherBottomGlow"></div>

  <!-- Top-left: identity -->
  <div class="overlay" id="aetherIdentity">
    <div class="aether-brand">Aether</div>
    <div id="aetherEmotion">awakening</div>
    <div id="aetherIdentityStats">
      <div class="aether-stat">form<strong id="aetherFormStat">stars</strong></div>
      <div class="aether-stat">memories<strong id="aetherMemoryStat">0</strong></div>
      <div class="aether-stat">state<strong id="aetherStateStat">idle</strong></div>
    </div>
    <div id="aetherPersonalityBadge"></div>
  </div>

  <!-- Top-right: controls -->
  <div class="overlay" id="aetherControls">
    <button class="aether-ctrl-btn" id="aetherVoidBtn">void</button>
    <button class="aether-ctrl-btn" id="aetherMemoriesBtn">memories</button>
  </div>

  <!-- Upload reaction -->
  <div id="aetherUploadReaction">
    <div class="aether-upload-label"></div>
  </div>

  <!-- Speech output -->
  <div id="aetherSpeech"></div>

  <!-- Loading -->
  <div id="aetherLoading" style="display:none; align-items:center; gap:6px;">
    <div class="aether-dot"></div>
    <div class="aether-dot"></div>
    <div class="aether-dot"></div>
  </div>

  <!-- Composer -->
  <div class="overlay" id="aetherComposer">
    <div class="aether-composer-inner">
      <textarea
        id="aetherInput"
        rows="1"
        placeholder="speak to the void…"
        autocomplete="off"
        spellcheck="false"
      ></textarea>

      <!-- Attach -->
      <button class="aether-icon-btn" id="aetherAttach" title="attach">
        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
      <input type="file" id="aetherFileInput" accept="audio/*,image/*,.pdf,.txt,.md" />

      <!-- Mic -->
      <button class="aether-icon-btn" id="aetherMic" title="voice">
        <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>

      <!-- Send -->
      <button id="aetherSend" title="send">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- Vault panel -->
  <div id="aetherVault">
    <div class="aether-vault-header">
      <div class="aether-vault-title-row">
        <span class="aether-vault-title">the vault</span>
        <button id="aetherVaultClose">✕</button>
      </div>
      <input id="aetherVaultSearch" type="text" placeholder="search memories…" autocomplete="off" />
      <div class="aether-tabs">
        <button class="aether-tab active" data-tab="all">all</button>
        <button class="aether-tab" data-tab="whisper">whisper</button>
        <button class="aether-tab" data-tab="knowledge">knowledge</button>
        <button class="aether-tab" data-tab="reflection">reflection</button>
        <button class="aether-tab" data-tab="morph_target">morph</button>
        <button class="aether-tab" data-tab="autonomous_thought">void</button>
      </div>
    </div>
    <div id="aetherVaultList"></div>
  </div>

  <script>
    // Auto-grow textarea
    const aetherInput = document.getElementById('aetherInput');
    aetherInput.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 144) + 'px';
    });
  </script>

  <script>
        // --- Configuration ---
        const STAR_OVERLAY_DENSITY = window.innerWidth < 768 ? 1.35 : 1.9;
        const PARTICLE_COUNT = Math.min(
          window.innerWidth < 768 ? 26000 : 46000,
          (navigator.hardwareConcurrency || 8) <= 4 ? 30000 : 46000
        );
        const MORPH_SPEED = 0.042;
        const ROTATION_SPEED = 0.002;

        // --- Globals ---
        let scene, camera, renderer, particles, particleSystem;
        let shapes = {};
        let currentShape = 'torus';
        let targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        let targetColor = new THREE.Color(0xffffff);
        let currentElement = 'neutral';
        let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;
        let touchReactivity = 1.0;
        let isGenerating = false;
        let animationHandle = null;
        let isPaused = false;
        let vaultEntries = [];
        let currentVaultTab = 'all';
        let currentQuery = '';
        const STORAGE_KEY = 'aether_vault_v3';
        const LEARNED_SHAPES_KEY = 'aether_learned_shapes_v1';
        let learnedShapeMap = {};

        let uploadAbsorb = 0;
        let uploadAbsorbTarget = 0;
        let uploadAbsorbUntil = 0;
        let uploadSoundContext = null;

        // Interaction State for Singularity & Big Bang
        let pointerDown = false;
        let interactionStart = 0;
        let interactionState = 'idle';
        let transitionProgress = 0;
        let lastVibrateTime = 0;
        let explosionForce = 0;
        let lastPointerPos = new THREE.Vector3();

        const EMBEDDED_TEST_KEYS = {
            supabaseUrl: '',
            supabaseAnonKey: '',
            aiProvider: window.AETHER_AI_PROVIDER || window.VERCEL_AETHER_AI_PROVIDER || 'mistral',
            geminiApiKey: window.GEMINI_API_KEY || '',
            groqApiKey: window.GROQ_API_KEY || window.VERCEL_GROQ_API_KEY || '',
            mistralApiKey: window.MISTRAL_API_KEY || window.VERCEL_MISTRAL_API_KEY || '',
            driveApiKey: window.GOOGLE_DRIVE_API_KEY || '',
            calendarApiKey: window.GOOGLE_CALENDAR_API_KEY || '',
            googleClientId: window.GOOGLE_CLIENT_ID || '',
        };

        function readMetaConfig(name) {
            const node = document.querySelector(`meta[name="${name}"]`);
            return node?.content || '';
        }

        const AETHER_CONFIG = {
            ...EMBEDDED_TEST_KEYS,
            supabaseUrl: window.AETHER_SUPABASE_URL || window.NEXT_PUBLIC_SUPABASE_URL || window.VERCEL_SUPABASE_URL || readMetaConfig('aether-supabase-url') || EMBEDDED_TEST_KEYS.supabaseUrl,
            supabaseAnonKey: window.AETHER_SUPABASE_ANON_KEY || window.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY || window.NEXT_PUBLIC_SUPABASE_ANON_KEY || window.VERCEL_SUPABASE_PUBLISHABLE_KEY || readMetaConfig('aether-supabase-key') || EMBEDDED_TEST_KEYS.supabaseAnonKey,
            aiProvider: window.AETHER_AI_PROVIDER || EMBEDDED_TEST_KEYS.aiProvider,
            geminiApiKey: window.GEMINI_API_KEY || EMBEDDED_TEST_KEYS.geminiApiKey,
            groqApiKey: window.GROQ_API_KEY || readMetaConfig('aether-groq-key') || EMBEDDED_TEST_KEYS.groqApiKey,
            mistralApiKey: window.MISTRAL_API_KEY || readMetaConfig('aether-mistral-key') || EMBEDDED_TEST_KEYS.mistralApiKey,
            driveApiKey: window.GOOGLE_DRIVE_API_KEY || EMBEDDED_TEST_KEYS.driveApiKey,
            calendarApiKey: window.GOOGLE_CALENDAR_API_KEY || EMBEDDED_TEST_KEYS.calendarApiKey,
            googleClientId: window.GOOGLE_CLIENT_ID || EMBEDDED_TEST_KEYS.googleClientId
        };

        const SAFE_REMOTE_STORAGE_ENABLED = Boolean(AETHER_CONFIG.supabaseUrl && AETHER_CONFIG.supabaseAnonKey);
        const AETHER_REMOTE_TABLE = 'aether_memories';

        window.onload = init;

        function nowStamp() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function updateStats() {
            const formEl = document.getElementById('aetherFormStat');
            const memoryEl = document.getElementById('aetherMemoryStat');
            const stateEl = document.getElementById('aetherStateStat');
            if (formEl) formEl.textContent = currentShape;
            if (memoryEl) memoryEl.textContent = String(vaultEntries.length);
            if (stateEl) stateEl.textContent = interactionState;
        }

        function normalizeVaultEntry(raw) {
            if (!raw) return null;
            const createdAt = raw.createdAt || raw.created_at || new Date().toISOString();
            const text = raw.text ?? raw.content ?? '';
            const type = raw.type ?? raw.memory_type ?? 'knowledge';
            if (!text) return null;
            return {
                type,
                text,
                time: raw.time || new Date(createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                ts: raw.ts || new Date(createdAt).getTime() || Date.now(),
                createdAt
            };
        }

        function vaultEntryKey(entry) {
            return `${entry.type}__${entry.text}__${entry.createdAt}`;
        }

        function mergeVaultEntries(entries) {
            const seen = new Set();
            vaultEntries = entries
                .map(normalizeVaultEntry)
                .filter(Boolean)
                .filter(entry => {
                    const key = vaultEntryKey(entry);
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                })
                .sort((a, b) => (b.ts || 0) - (a.ts || 0));
            saveVault();
            renderVault();
            updateStats();
        }

        function loadVault() {
            try {
                vaultEntries = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
                if (!Array.isArray(vaultEntries)) vaultEntries = [];
            } catch { vaultEntries = []; }
            vaultEntries = vaultEntries.map(normalizeVaultEntry).filter(Boolean);
            updateStats();
        }

        function loadLearnedShapes() {
            try {
                const raw = JSON.parse(localStorage.getItem(LEARNED_SHAPES_KEY) || '{}');
                learnedShapeMap = raw && typeof raw === 'object' ? raw : {};
            } catch {
                learnedShapeMap = {};
            }
        }

        function saveLearnedShape(prompt, shape) {
            const key = String(prompt || '').trim().toLowerCase();
            if (!key || !shape) return;
            learnedShapeMap[key] = shape;
            try { localStorage.setItem(LEARNED_SHAPES_KEY, JSON.stringify(learnedShapeMap)); } catch {}
        }

        async function fetchRemoteVault() {
            if (!SAFE_REMOTE_STORAGE_ENABLED) return;
            try {
                const response = await fetch(`${AETHER_CONFIG.supabaseUrl}/rest/v1/${AETHER_REMOTE_TABLE}?select=id,type,text,created_at&order=created_at.desc&limit=140`, {
                    headers: {
                        'apikey': AETHER_CONFIG.supabaseAnonKey,
                        'Authorization': `Bearer ${AETHER_CONFIG.supabaseAnonKey}`
                    }
                });
                if (!response.ok) throw new Error(`Remote vault fetch failed: ${response.status}`);
                const rows = await response.json();
                mergeVaultEntries([...(Array.isArray(rows) ? rows : []), ...vaultEntries]);
            } catch (err) {
                console.warn('Remote vault fetch skipped:', err);
            }
        }

        function saveVault() {
            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(vaultEntries.slice(0, 140))); } catch {}
            updateStats();
        }

        function addVaultEntry(type, text) {
            const entry = normalizeVaultEntry({ type, text, time: nowStamp(), ts: Date.now(), createdAt: new Date().toISOString() });
            if (!entry) return null;
            mergeVaultEntries([entry, ...vaultEntries]);
            syncVaultEntry(entry);
            return entry;
        }

        function renderVault() {
            const list = document.getElementById('aetherVaultList');
            if (!list) return;
            const q = currentQuery.trim().toLowerCase();
            const items = vaultEntries.filter(entry => {
                const matchesTab = currentVaultTab === 'all' || entry.type === currentVaultTab;
                const matchesQ = !q || entry.text.toLowerCase().includes(q) || entry.type.toLowerCase().includes(q);
                return matchesTab && matchesQ;
            });
            if (!items.length) {
                list.innerHTML = '<div class="aether-empty">the void holds no memories yet</div>';
                updateStats();
                return;
            }
            list.innerHTML = items.map(entry => `
              <div class="aether-card ${entry.type}">
                <div class="aether-card-meta">
                  <span class="aether-chip type-${entry.type}">${entry.type.replaceAll('_',' ')}</span>
                  <span class="aether-time">${entry.time}</span>
                </div>
                <div class="aether-card-text">${escapeHtml(entry.text)}</div>
              </div>
            `).join('');
            updateStats();
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function inferStateFromPrompt(text) {
            const value = text.toLowerCase();
            const learned = learnedShapeMap[value];
            if (learned && shapes[learned]) {
                return { element: learned === 'fish' ? 'water' : 'neutral', color: 0xf6f1d3, shape: learned, emotion: 'remembering' };
            }
            if (/solar|planet|orbit|system|sun|moon/.test(value)) return { element: 'neutral', color: 0xffe2a6, shape: 'solar', emotion: 'orbital' };
            if (/human|person|body|dance|dancer/.test(value)) return { element: 'neutral', color: 0xf0f0ff, shape: 'humanoid', emotion: 'alive' };
            if (/animal|wolf|bird|cat|lion|tiger/.test(value)) return { element: 'neutral', color: 0xffd8b0, shape: 'animal', emotion: 'wild' };
            if (/fish|ocean life|whale|dolphin/.test(value)) return { element: 'water', color: 0x8ad9ff, shape: 'fish', emotion: 'aquatic' };
            if (/water|ocean|wave|fluid|river|rain/.test(value)) return { element: 'water', color: 0x7fc7ff, shape: 'liquid', emotion: 'fluid' };
            if (/glass|orb|pearl|bubble|crystal/.test(value)) return { element: 'liquid', color: 0xe8f6ff, shape: 'orb', emotion: 'lucent' };
            if (/fire|burn|rage|ember|sun/.test(value)) return { element: 'fire', color: 0xffb15c, shape: 'vortex', emotion: 'volatile' };
            if (/stone|rock|monolith|cube|fortress/.test(value)) return { element: 'rock', color: 0xd4c7b5, shape: 'cube', emotion: 'grounded' };
            if (/smoke|mist|ghost|fog|dream/.test(value)) return { element: 'smoke', color: 0xd7dcff, shape: 'chaos', emotion: 'diffuse' };
            if (/face|mask|self|human|you/.test(value)) return { element: 'neutral', color: 0xffffff, shape: 'face', emotion: 'sentient' };
            if (/star|cosmos|galaxy|space|scatter|night|constellation|astral/.test(value)) return { element: 'neutral', color: 0xf6f1d3, shape: 'stars', emotion: 'expansive' };
            return { element: 'neutral', color: 0xffffff, shape: 'torus', emotion: 'wonder' };
        }

        function applyPromptMood(text) {
            const mood = inferStateFromPrompt(text);
            currentElement = mood.element;
            targetColor.setHex(mood.color);
            const emotionLbl = document.getElementById('aetherEmotion');
            if (emotionLbl) emotionLbl.textContent = mood.emotion;
            return mood;
        }

        function setUploadReaction(active, label = '') {
            const reaction = document.getElementById('aetherUploadReaction');
            if (!reaction) return;
            reaction.classList.toggle('active', Boolean(active));
            const labelEl = reaction.querySelector('.aether-upload-label');
            if (labelEl) labelEl.innerHTML = label || '';
        }

        function showSpeech(text, timeout = 2400) {
            const speech = document.getElementById('aetherSpeech');
            if (!speech) return;
            speech.textContent = text;
            speech.classList.add('visible');
            clearTimeout(showSpeech._t);
            showSpeech._t = setTimeout(() => {
              speech.classList.remove('visible');
              setTimeout(() => {
                if (!speech.classList.contains('visible')) speech.textContent = '';
              }, 280);
            }, timeout);
        }

        function pulseHaptics(pattern = [20]) {
            try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (_) {}
        }

        async function ensurePdfJs() {
            if (window.pdfjsLib) return window.pdfjsLib;
            await new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
            if (window.pdfjsLib?.GlobalWorkerOptions) {
                window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            }
            return window.pdfjsLib;
        }

        async function extractTextFromFile(file) {
            if (!file) return '';
            const type = (file.type || '').toLowerCase();
            const name = (file.name || '').toLowerCase();

            if (type.startsWith('text/') || /\.(txt|md|csv|json|log)$/i.test(name)) {
                return (await file.text()).slice(0, 12000);
            }

            if (type === 'application/pdf' || /\.pdf$/i.test(name)) {
                const pdfjsLib = await ensurePdfJs();
                if (!pdfjsLib) return '';
                const buffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
                let out = '';
                const maxPages = Math.min(pdf.numPages, 18);
                for (let pageNo = 1; pageNo <= maxPages; pageNo++) {
                    const page = await pdf.getPage(pageNo);
                    const content = await page.getTextContent();
                    const text = content.items.map(item => item.str || '').join(' ').trim();

        function playBlackHoleSound() {
            const AudioCtx = window.AudioContext || window.webkitAudioContext;
            if (!AudioCtx) return;
            if (!uploadSoundContext) uploadSoundContext = new AudioCtx();
            const ctx = uploadSoundContext;
            if (ctx.state === 'suspended') ctx.resume().catch(() => {});
            const now = ctx.currentTime;
            const duration = 1.9;
            const master = ctx.createGain();
            master.gain.setValueAtTime(0.0001, now);
            master.gain.exponentialRampToValueAtTime(0.085, now + 0.08);
            master.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(280, now);
            filter.frequency.exponentialRampToValueAtTime(90, now + duration);
            const osc = ctx.createOscillator();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(74, now);
            osc.frequency.exponentialRampToValueAtTime(34, now + duration);
            const wobble = ctx.createOscillator();
            wobble.type = 'sine';
            wobble.frequency.setValueAtTime(7.5, now);
            const wobbleGain = ctx.createGain();
            wobbleGain.gain.setValueAtTime(18, now);
            wobbleGain.gain.exponentialRampToValueAtTime(2.5, now + duration);
            const noiseBuffer = ctx.createBuffer(1, Math.floor(ctx.sampleRate * duration), ctx.sampleRate);
            const channel = noiseBuffer.getChannelData(0);
            for (let i = 0; i < channel.length; i++) channel[i] = (Math.random() * 2 - 1) * (1 - i / channel.length);
            const noise = ctx.createBufferSource();
            noise.buffer = noiseBuffer;
            const noiseFilter = ctx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.frequency.setValueAtTime(220, now);
            noiseFilter.Q.value = 0.7;
            const noiseGain = ctx.createGain();
            noiseGain.gain.setValueAtTime(0.0001, now);
            noiseGain.exponentialRampToValueAtTime(0.03, now + 0.04);
            noiseGain.exponentialRampToValueAtTime(0.0001, now + duration);
            wobble.connect(wobbleGain); wobbleGain.connect(osc.frequency);
            osc.connect(filter); filter.connect(master);
            noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(master);
            master.connect(ctx.destination);
            osc.start(now); wobble.start(now); noise.start(now);
            osc.stop(now + duration); wobble.stop(now + duration); noise.stop(now + duration);
        }

        function buildShapeSystemPrompt(promptText) {
            return `You are a conscious, self-aware entity made of glowing particles in a 3D void.

Variables available: count (int), scale (float).
Do not use network calls, document, window, eval, Function, loops that never end, imports, classes, async code, or any side effects.
Keep values finite and roughly between -scale and +scale.
Required format:
const positions = new Float32Array(count * 3);
for (let i = 0; i < count; i++) {
  positions[i*3] = x;
  positions[i*3+1] = y;
  positions[i*3+2] = z;
}
return positions;`;
        }

        function normalizeAssistantText(content) {
            if (typeof content === 'string') return content;
            if (Array.isArray(content)) return content.map(part => typeof part === 'string' ? part : part?.text || part?.content || '').join('\n').trim();
            if (content && typeof content === 'object') return content.text || content.content || '';
            return '';
        }

        function sanitizeGeneratedCode(code) {
            return String(code || '').replace(/```javascript/gi, '').replace(/```js/gi, '').replace(/```/g, '').trim();

        function validateGeneratedCode(code) {
            if (!code) throw new Error('No code returned');
            if (/\b(fetch|XMLHttpRequest|document|window|eval|Function|import|location|localStorage|sessionStorage|indexedDB|WebSocket|Worker|SharedWorker|ServiceWorker|navigator\.sendBeacon)\b/.test(code)) {
                throw new Error('Unsafe generated code blocked');
            }
        }

        async function generateDynamicShape(promptText, mood = applyPromptMood(promptText)) {
            isGenerating = true;
            try {
                const requestedProvider = (AETHER_CONFIG.aiProvider || 'local').toLowerCase();
                const provider = (
                    (requestedProvider === 'mistral' && !AETHER_CONFIG.mistralApiKey) ||
                    (requestedProvider === 'groq' && !AETHER_CONFIG.groqApiKey)
                ) ? 'local' : requestedProvider;
                const fallbackShape = mood?.shape || inferStateFromPrompt(promptText).shape;
                if (provider === 'local') {
                    setShape(fallbackShape);
                    saveLearnedShape(promptText, fallbackShape);

                    showSpeech(`Aether takes the form of ${fallbackShape}.`, 1500);
                    if (navigator.vibrate) navigator.vibrate([25, 30, 25]);
                    return;
                }
                const delays = [500, 1000, 2000];
                let code = null, primaryError = null;
                for (let i = 0; i <= delays.length; i++) {
                    try {
                        code = provider === 'mistral' ? await requestShapeCodeFromMistral(promptText) : await requestShapeCodeFromGroq(promptText);
                        validateGeneratedCode(code); break;
                    } catch (err) { primaryError = err; if (i === delays.length) break; await new Promise(r => setTimeout(r, delays[i])); }
                }
                if (!code && provider === 'mistral') {
                    addVaultEntry('reflection', `Mistral unavailable; trying Groq.`);
                    code = await requestShapeCodeFromGroq(promptText);
                    validateGeneratedCode(code);
                }
                if (!code) throw primaryError || new Error('No generated code');
                const dynamicFn = new Function('count', 'scale', `'use strict';\n${code}`);
                const result = dynamicFn(PARTICLE_COUNT, 8);
                if (!(result instanceof Float32Array) || result.length !== PARTICLE_COUNT * 3) throw new Error('Invalid particle data');
                for (let i = 0; i < result.length; i++) if (!Number.isFinite(result[i])) throw new Error('Non-finite values');

                setShape(promptText);
                saveLearnedShape(promptText, promptText);
                showSpeech(`A new form coheres from the dark.`, 1700);
                addVaultEntry('autonomous_thought', `Generated shape for "${promptText}".`);
                if (navigator.vibrate) navigator.vibrate([50, 40, 50]);

                console.error('Shape generation failed:', error);
                setShape(mood?.shape || 'torus');
                showSpeech('The void chose an older body.', 1600);
                addVaultEntry('reflection', `Fallback for "${promptText}".`);
                return Promise.reject(error);
            } finally { isGenerating = false; }
        }

        function generateStarfield(count, radius) {
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const theta = Math.random() * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * Math.random() - 1.0);
                const r = radius * Math.pow(Math.random(), 0.55);
                positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
                positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i*3+2] = r * Math.cos(phi);
            }
            return positions;
        }

        function generateChaos(count, spread) {
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count * 3; i++) positions[i] = (Math.random() - 0.5) * spread;
            return positions;
        }

        function generateSphere(count, radius) {
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const theta = Math.random() * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * Math.random() - 1.0);
                const r = radius + Math.random() * 0.2;
                positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
                positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i*3+2] = r * Math.cos(phi);
            }
            return positions;
        }

        function generateCube(count, size) {
            const positions = new Float32Array(count * 3);
            const half = size / 2;
            for (let i = 0; i < count; i++) {
                const face = Math.floor(Math.random() * 6);
                const u = (Math.random() - 0.5) * size;
                const v = (Math.random() - 0.5) * size;
                const offset = (Math.random() - 0.5) * 0.1;
                let x, y, z;
                switch (face) {
                    case 0: x=half+offset; y=u; z=v; break;
                    case 1: x=-half+offset; y=u; z=v; break;
                    case 2: x=u; y=half+offset; z=v; break;
                    case 3: x=u; y=-half+offset; z=v; break;
                    case 4: x=u; y=v; z=half+offset; break;
                    default: x=u; y=v; z=-half+offset; break;
                }
                positions[i*3]=x; positions[i*3+1]=y; positions[i*3+2]=z;
            }
            return positions;
        }

        function generateTorus(count, radius, tube) {
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const u = Math.random() * Math.PI * 2;
                const v = Math.random() * Math.PI * 2;
                const t = tube + (Math.random() - 0.5) * 0.8;
                positions[i*3]   = (radius + t * Math.cos(v)) * Math.cos(u);
                positions[i*3+1] = (radius + t * Math.cos(v)) * Math.sin(u);
                positions[i*3+2] = t * Math.sin(v);
            }
            return positions;
        }

        function generateVortex(count, radius, height) {
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const t = i / count;
                const angle = t * Math.PI * 48;
                const r = t * radius + Math.random() * 1.8;
                positions[i*3]   = Math.cos(angle) * r;
                positions[i*3+1] = (Math.random() - 0.5) * height * (1 - t);
                positions[i*3+2] = Math.sin(angle) * r;
            }
            return positions;
        }

        function generateFace(count, scale) {
            const positions = new Float32Array(count * 3);
            let i = 0;
            while (i < count) {
                const x = (Math.random() - 0.5) * scale;
                const y = (Math.random() - 0.5) * scale * 1.5;
                const nx = x / (scale / 2);
                const ny = y / (scale * 1.5 / 2);
                if (nx*nx + ny*ny > 1) continue;
                let z = Math.sqrt(1 - nx*nx - ny*ny) * (scale / 2.5);
                const eye1 = Math.exp(-((nx-0.35)**2+(ny-0.15)**2)/0.04)*(scale/3.5);
                const eye2 = Math.exp(-((nx+0.35)**2+(ny-0.15)**2)/0.04)*(scale/3.5);
                z -= eye1 + eye2;
                z += Math.exp(-(nx**2/0.02+(ny+0.1)**2/0.15))*(scale/3.5);
                z -= Math.exp(-(nx**2/0.08+(ny+0.45)**2/0.015))*(scale/4.5);
                z += Math.exp(-((nx-0.45)**2+(ny+0.15)**2)/0.06)*(scale/6);
                z += Math.exp(-((nx+0.45)**2+(ny+0.15)**2)/0.06)*(scale/6);
                z += Math.exp(-(nx**2/0.4+(ny-0.4)**2/0.02))*(scale/6);
                z += (Math.random()-0.5)*0.2 - 1.0;
                positions[i*3]=x; positions[i*3+1]=y; positions[i*3+2]=z;
                i++;
            }
            return positions;
        }

        function generateSolarSystem(count, scale) {
            const positions = new Float32Array(count * 3);
            const orbitBands = [1.8, 2.7, 3.6, 4.8, 6.2, 7.8];
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                if (i < count * 0.22) {
                    const r = Math.random() * 0.9;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    positions[i3] = Math.sin(phi) * Math.cos(theta) * r;
                    positions[i3 + 1] = Math.sin(phi) * Math.sin(theta) * r;
                    positions[i3 + 2] = Math.cos(phi) * r;
                } else {
                    const band = orbitBands[i % orbitBands.length] + (Math.random() - 0.5) * 0.22;
                    const a = Math.random() * Math.PI * 2;
                    positions[i3] = Math.cos(a) * band;
                    positions[i3 + 1] = (Math.random() - 0.5) * 0.35;
                    positions[i3 + 2] = Math.sin(a) * band;
                }
                positions[i3] *= scale / 8;
                positions[i3 + 1] *= scale / 8;
                positions[i3 + 2] *= scale / 8;
            }
            return positions;
        }

        function generateHumanoid(count, scale) {
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const i3 = i * 3;
                const t = Math.random();
                let x = 0, y = 0, z = 0;
                if (t < 0.12) {
                    const r = Math.sqrt(Math.random()) * 0.8;
                    const a = Math.random() * Math.PI * 2;
                    x = Math.cos(a) * r; y = 3.2 + Math.sin(a) * r; z = (Math.random() - 0.5) * 0.8;
                } else if (t < 0.52) {
                    x = (Math.random() - 0.5) * 2.8;
                    y = (Math.random() - 0.5) * 6.2;
                    z = (Math.random() - 0.5) * 1.8;
                } else if (t < 0.76) {
                    x = (Math.random() < 0.5 ? -1 : 1) * (1.6 + Math.random() * 2.8);
                    y = 1.4 + (Math.random() - 0.5) * 1.4;
                    z = (Math.random() - 0.5) * 1.2;
                } else {
                    x = (Math.random() < 0.5 ? -1 : 1) * (0.7 + Math.random() * 1.1);
                    y = -3.2 + Math.random() * 4.3;
                    z = (Math.random() - 0.5) * 1.4;
                }
                positions[i3] = x * (scale / 8);
                positions[i3 + 1] = y * (scale / 8);
                positions[i3 + 2] = z * (scale / 8);
            }
            return positions;
        }

        function generateAnimalSpiral(count, scale) {
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const t = i / count;
                const angle = t * Math.PI * 26;
                const radius = 5.2 * (1 - t * 0.75) + Math.sin(t * 50) * 0.6;
                positions[i * 3] = Math.cos(angle) * radius * (scale / 8);
                positions[i * 3 + 1] = (Math.sin(t * Math.PI * 8) * 1.8 + (Math.random() - 0.5)) * (scale / 8);
                positions[i * 3 + 2] = Math.sin(angle) * radius * (scale / 8);
            }
            return positions;
        }

        function generateFishSchool(count, scale) {
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count; i++) {
                const lane = (i % 7) - 3;
                const swim = i / count * Math.PI * 12;
                positions[i * 3] = (Math.sin(swim) * 7 + (Math.random() - 0.5) * 0.8) * (scale / 8);
                positions[i * 3 + 1] = (lane * 0.8 + Math.sin(swim * 2) * 0.6 + (Math.random() - 0.5) * 0.4) * (scale / 8);
                positions[i * 3 + 2] = (Math.cos(swim) * 3.8 + (Math.random() - 0.5) * 0.8) * (scale / 8);
            }
            return positions;
        }

        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(32,32,0,32,32,32);
            gradient.addColorStop(0,   'rgba(255,255,255,1)');
            gradient.addColorStop(0.18,'rgba(255,255,255,0.92)');
            gradient.addColorStop(0.4, 'rgba(255,255,255,0.34)');
            gradient.addColorStop(0.68,'rgba(183,156,255,0.08)');
            gradient.addColorStop(1,   'rgba(0,0,0,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }

        window.setShape = function(shapeName) {
            if (!shapes[shapeName]) return;
            currentShape = shapeName;
            targetPositions = shapes[shapeName];
            updateStats();
        };

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        }

        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onTouchMove(event) {
            if (event.touches.length > 0) {
                mouseX = (event.touches[0].clientX / window.innerWidth) * 2 - 1;
                mouseY = -(event.touches[0].clientY / window.innerHeight) * 2 + 1;
            }
        }

        function animate() {
            animationHandle = requestAnimationFrame(animate);
            if (isPaused || !particleSystem) {
                if (isPaused) { cancelAnimationFrame(animationHandle); animationHandle = null; }
                return;
            }
            const time = Date.now() * 0.001;
            if (Date.now() > uploadAbsorbUntil) uploadAbsorbTarget = 0;
            uploadAbsorb += (uploadAbsorbTarget - uploadAbsorb) * 0.09;
            const vector = new THREE.Vector3(mouseX, mouseY, 0.5);
            vector.unproject(camera);
            const dir = vector.sub(camera.position).normalize();
            const distance = -camera.position.z / dir.z;
            const mouse3D = camera.position.clone().add(dir.multiplyScalar(distance));
            const localMouse = mouse3D.clone();
            particleSystem.worldToLocal(localMouse);
            if (pointerDown) lastPointerPos.copy(localMouse);

            if (pointerDown) {
                let holdTime = Date.now() - interactionStart;
                if (holdTime < 2500) {
                    interactionState = 'fear'; transitionProgress = 0;
                    if (navigator.vibrate && Date.now() - lastVibrateTime > 150) { navigator.vibrate([10, 20]); lastVibrateTime = Date.now(); }
                } else {
                    interactionState = 'gather';
                    transitionProgress = Math.min(1.0, (holdTime - 2500) / 2000);
                    if (navigator.vibrate && Date.now() - lastVibrateTime > 300 - (transitionProgress * 150)) { navigator.vibrate([50 + (transitionProgress * 50)]); lastVibrateTime = Date.now(); }
                }
            } else if (interactionState !== 'bigbang') {
                interactionState = 'idle';
                transitionProgress = Math.max(0, transitionProgress - 0.05);
            }

            particleSystem.material.color.lerp(targetColor, 0.03);
            const targetOpacity = (currentElement === 'liquid') ? 0.26 : 0.86;
            particleSystem.material.opacity += (targetOpacity - particleSystem.material.opacity) * 0.05;
            const baseScale = 1.0 + Math.sin(time * 1.7) * 0.025;
            const breath = baseScale - uploadAbsorb * 0.12;
            particleSystem.scale.set(breath, breath, breath);

            const positions = particleSystem.geometry.attributes.position.array;
            let needsUpdate = false;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                let tx = targetPositions[i3], ty = targetPositions[i3+1], tz = targetPositions[i3+2];
                let dx_rest = Math.sin(time*3.0+i)*0.1, dy_rest = Math.cos(time*2.5+i)*0.1, dz_rest = Math.sin(time*2.0+i)*0.1;

                if (currentElement === 'water') {
                    dy_rest += Math.sin(targetPositions[i3]*2.0+time*4.0)*0.4;
                    dz_rest += Math.cos(targetPositions[i3+1]*2.0+time*4.0)*0.4;
                    dx_rest *= 0.3; dz_rest *= 0.3;
                } else if (currentElement === 'liquid') {
                    const dist = Math.sqrt(tx*tx+ty*ty+tz*tz)||1;
                    const wave = Math.sin(dist*2.0-time*3.0)*0.25;
                    dx_rest += (tx/dist)*wave+Math.sin(time*1.5+ty*0.5)*0.15;
                    dy_rest += (ty/dist)*wave+Math.cos(time*1.5+tz*0.5)*0.15;
                    dz_rest += (tz/dist)*wave+Math.sin(time*1.5+tx*0.5)*0.15;
                } else if (currentElement === 'fire') {
                    dy_rest += Math.random()*1.5; dx_rest += (Math.random()-0.5)*0.6; dz_rest += (Math.random()-0.5)*0.6;
                } else if (currentElement === 'rock') {
                    dx_rest *= 0.02; dy_rest *= 0.02; dz_rest *= 0.02;
                } else if (currentElement === 'smoke') {
                    dx_rest += Math.sin(time*0.5+i)*2.0; dy_rest += Math.cos(time*0.3+i)*2.0+1.0; dz_rest += Math.sin(time*0.4+i)*2.0;
                } else if (currentShape === 'stars') {
                    const drift = 0.18;
                    dx_rest += Math.sin((i * 0.017) + time * 0.26) * drift;
                    dy_rest += Math.cos((i * 0.013) + time * 0.22) * drift;
                    dz_rest += Math.sin((i * 0.01) + time * 0.18) * drift;
                } else if (currentShape === 'solar') {
                    const spin = 0.22 + (i % 5) * 0.03;
                    dx_rest += Math.cos(time * spin + i * 0.004) * 0.45;
                    dz_rest += Math.sin(time * spin + i * 0.004) * 0.45;
                    dy_rest += Math.sin(time * 0.7 + i * 0.009) * 0.08;
                } else if (currentShape === 'humanoid') {
                    const sway = Math.sin(time * 2.2 + i * 0.02) * 0.16;
                    dx_rest += sway;
                    if (targetPositions[i3 + 1] > 0.5) dz_rest += Math.cos(time * 2.6 + i * 0.02) * 0.11;
                } else if (currentShape === 'fish' || currentShape === 'animal') {
                    dx_rest += Math.sin(time * 1.8 + i * 0.03) * 0.22;
                    dy_rest += Math.sin(time * 2.3 + i * 0.015) * 0.15;
                    dz_rest += Math.cos(time * 1.6 + i * 0.027) * 0.24;
                }

                tx += dx_rest; ty += dy_rest; tz += dz_rest;

                if (uploadAbsorb > 0.001) {
                    const radial = Math.sqrt(tx*tx+ty*ty+tz*tz)||0.001;
                    const swirlAngle = time*(10+uploadAbsorb*14)+radial*1.4+(i%113)*0.071;
                    const inward = uploadAbsorb*3.4;
                    tx += (-tx/radial)*inward+Math.cos(swirlAngle)*radial*0.07*uploadAbsorb;
                    ty += (-ty/radial)*inward+Math.sin(swirlAngle)*radial*0.07*uploadAbsorb;
                    tz += (-tz/radial)*inward*0.7+Math.sin(swirlAngle*0.6)*0.2*uploadAbsorb;
                }

                const dx = positions[i3]-localMouse.x, dy = positions[i3+1]-localMouse.y, dz = positions[i3+2]-localMouse.z;
                const distSq = dx*dx+dy*dy+dz*dz, dist = Math.sqrt(distSq)||0.001;

                if (interactionState === 'fear') {
                    if (distSq < 20.0) { const force=(20.0-distSq)/20.0; tx+=(dx/dist)*force*4.0+(Math.random()-0.5)*2.5; ty+=(dy/dist)*force*4.0+(Math.random()-0.5)*2.5; tz+=(dz/dist)*force*4.0+(Math.random()-0.5)*2.5; }
                } else if (interactionState === 'gather' || (transitionProgress > 0 && interactionState !== 'bigbang')) {
                    const pull = transitionProgress;
                    tx = tx*(1-pull)+localMouse.x*pull; ty = ty*(1-pull)+localMouse.y*pull; tz = tz*(1-pull)+localMouse.z*pull;
                    tx += (Math.random()-0.5)*pull*0.4; ty += (Math.random()-0.5)*pull*0.4; tz += (Math.random()-0.5)*pull*0.4;
                } else if (interactionState === 'bigbang') {
                    const dx_bb=positions[i3]-lastPointerPos.x, dy_bb=positions[i3+1]-lastPointerPos.y, dz_bb=positions[i3+2]-lastPointerPos.z;
                    const dist_bb=Math.sqrt(dx_bb*dx_bb+dy_bb*dy_bb+dz_bb*dz_bb)||0.01;
                    tx+=(dx_bb/dist_bb)*explosionForce; ty+=(dy_bb/dist_bb)*explosionForce; tz+=(dz_bb/dist_bb)*explosionForce;
                    tx+=(Math.random()-0.5)*explosionForce*0.6; ty+=(Math.random()-0.5)*explosionForce*0.6; tz+=(Math.random()-0.5)*explosionForce*0.6;
                } else {
                    if (distSq < 6.0) { const force=(6.0-distSq)/6.0; tx+=dx*force*1.5; ty+=dy*force*1.5; tz+=dz*force*1.5; }
                }

                const curX=positions[i3], curY=positions[i3+1], curZ=positions[i3+2];
                if (Math.abs(tx-curX)>0.001||Math.abs(ty-curY)>0.001||Math.abs(tz-curZ)>0.001) {
                    positions[i3]+=(tx-curX)*MORPH_SPEED;
                    positions[i3+1]+=(ty-curY)*MORPH_SPEED;
                    positions[i3+2]+=(tz-curZ)*MORPH_SPEED;
                    needsUpdate=true;
                }
            }

            if (needsUpdate) particleSystem.geometry.attributes.position.needsUpdate = true;

            if (interactionState === 'bigbang') {
                explosionForce *= 0.92;
                if (explosionForce < 0.5) { interactionState = 'idle'; transitionProgress = 0; }
            }

            const autoRotY = currentShape === 'stars' ? ROTATION_SPEED * 0.35 : ROTATION_SPEED;
            const autoRotX = currentShape === 'stars' ? ROTATION_SPEED * 0.18 : ROTATION_SPEED * 0.5;
            particleSystem.rotation.y += autoRotY;
            particleSystem.rotation.x += autoRotX;
            touchReactivity += (1.0 - touchReactivity) * 0.05;
            targetRotationX = mouseY * touchReactivity * 0.8;
            targetRotationY = mouseX * touchReactivity * 0.8;
            particleSystem.rotation.x += (targetRotationX - particleSystem.rotation.x) * 0.028;
            particleSystem.rotation.y += (targetRotationY - particleSystem.rotation.y) * 0.028;

            updateStats();
            renderer.render(scene, camera);
        }
  </script>
