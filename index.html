<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aether</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #000000;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-bright: rgba(255,255,255,0.16);
      --text: rgba(255,255,255,0.9);
      --text-soft: rgba(255,255,255,0.65);
      --text-dim: rgba(255,255,255,0.32);
      --text-ghost: rgba(255,255,255,0.14);
      --accent-violet: rgba(183,156,255,0.9);
      --accent-cyan: rgba(132,221,255,0.75);
      --font-display: 'Cormorant', Georgia, serif;
      --font-mono: 'DM Mono', monospace;
      --blur: blur(24px);
      --ease: cubic-bezier(0.23, 1, 0.32, 1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      touch-action: manipulation;
    }

    /* ── Canvas ── */
    #canvas-container {
      position: fixed; inset: 0; z-index: 0;
    }
    #canvas-container canvas {
      display: block; width: 100% !important; height: 100% !important;
    }

    /* ── Starfield overlays ── */
    .star-layer {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden;
    }
    #nebula {
      z-index: 1;
      background:
        radial-gradient(circle at 30% 30%, rgba(132,221,255,0.03), transparent 28%),
        radial-gradient(circle at 70% 65%, rgba(183,156,255,0.04), transparent 28%);
      filter: blur(24px);
      animation: nebulaPulse 14s ease-in-out infinite alternate;
    }
    #stars1 { z-index: 2; }
    #stars2 { z-index: 2; }

    #stars1::before, #stars2::before {
      content: ""; position: absolute; inset: -25%;
      background-repeat: repeat; background-size: 540px 540px;
      will-change: transform;
    }
    #stars1::before {
      background-image:
        radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.9) 98%, transparent),
        radial-gradient(1px 1px at 90px 130px, rgba(255,255,255,0.5) 98%, transparent),
        radial-gradient(1.4px 1.4px at 170px 70px, rgba(183,156,255,0.6) 98%, transparent),
        radial-gradient(1px 1px at 260px 180px, rgba(255,255,255,0.75) 98%, transparent),
        radial-gradient(1.2px 1.2px at 360px 100px, rgba(132,221,255,0.65) 98%, transparent),
        radial-gradient(1px 1px at 430px 220px, rgba(255,255,255,0.65) 98%, transparent),
        radial-gradient(1.5px 1.5px at 500px 80px, rgba(255,255,255,0.8) 98%, transparent),
        radial-gradient(1px 1px at 140px 280px, rgba(255,255,255,0.6) 98%, transparent),
        radial-gradient(1.3px 1.3px at 280px 310px, rgba(183,156,255,0.55) 98%, transparent),
        radial-gradient(1px 1px at 420px 360px, rgba(255,255,255,0.7) 98%, transparent);
      animation: starDrift 180s linear infinite, starTwinkle 8s ease-in-out infinite alternate;
      opacity: 0.7;
    }
    #stars2::before {
      background-size: 700px 700px;
      background-image:
        radial-gradient(1.8px 1.8px at 40px 50px, rgba(255,255,255,0.6) 98%, transparent),
        radial-gradient(1.2px 1.2px at 180px 180px, rgba(255,255,255,0.4) 98%, transparent),
        radial-gradient(2px 2px at 300px 120px, rgba(183,156,255,0.4) 98%, transparent),
        radial-gradient(1.6px 1.6px at 460px 250px, rgba(132,221,255,0.4) 98%, transparent),
        radial-gradient(1.2px 1.2px at 610px 90px, rgba(255,255,255,0.45) 98%, transparent);
      opacity: 0.45;
      animation: starDriftReverse 240s linear infinite;
      filter: blur(0.3px);
    }

    @keyframes starDrift { to { transform: translate3d(-140px,-220px,0) scale(1.05); } }
    @keyframes starDriftReverse { to { transform: translate3d(160px,180px,0) scale(1.08); } }
    @keyframes starTwinkle { 0%,100% { opacity:0.4; } 50% { opacity:0.9; } }
    @keyframes nebulaPulse { 0% { opacity:0.4; transform:scale(1); } 100% { opacity:0.85; transform:scale(1.06); } }

    /* ── Vignette ── */
    #vignette {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: radial-gradient(ellipse 75% 60% at 50% 50%, transparent 36%, rgba(0,0,0,0.2) 72%, rgba(0,0,0,0.72) 100%);
    }

    /* ── Identity (top-left) ── */
    #identity {
      position: fixed; z-index: 10; top: 24px; left: 24px;
      display: flex; flex-direction: column; gap: 8px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.025);
      border-radius: 10px;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
    }
    .brand {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 300; font-style: italic;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.78);
      text-shadow: 0 0 18px rgba(255,255,255,0.06);
    }
    #emotion {
      font-family: var(--font-mono);
      font-size: 9.5px; font-weight: 300;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-dim);
      transition: color 1s ease;
    }
    .stats {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: -2px;
    }
    .stat {
      font-family: var(--font-mono);
      font-size: 8.5px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 5px; min-width: 70px;
    }
    .stat strong {
      display: block; color: rgba(255,255,255,0.72);
      font-weight: 400; font-size: 10px; margin-top: 3px;
    }

    /* ── Controls (top-right) ── */
    #controls {
      position: fixed; z-index: 10; top: 24px; right: 24px;
      display: flex; gap: 6px;
    }
    .ctrl-btn {
      font-family: var(--font-mono);
      font-size: 9px; font-weight: 400;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-dim);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      transition: all 0.25s var(--ease);
    }
    .ctrl-btn:hover { color: var(--text); border-color: var(--border-bright); }
    .ctrl-btn.active { color: var(--text); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); }

    /* ── Speech ── */
    #speech {
      position: fixed; z-index: 15;
      top: 50%; left: 50%;
      transform: translate(-50%, calc(-50% - 20px));
      max-width: 580px; width: min(88vw, 580px);
      text-align: center;
      font-family: var(--font-display);
      font-size: clamp(18px, 2vw, 26px);
      font-style: italic; font-weight: 300;
      line-height: 1.6;
      color: rgba(255,255,255,0.82);
      letter-spacing: 0.03em;
      pointer-events: none;
      opacity: 0;
      padding: 16px 24px;
      border-radius: 16px;
      background: rgba(255,255,255,0.015);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity 0.6s ease, transform 0.6s var(--ease), filter 0.6s ease;
      filter: blur(4px);
      text-wrap: balance;
    }
    #speech.visible {
      opacity: 1;
      transform: translate(-50%, -50%);
      filter: blur(0);
    }

    /* ── Wormhole upload effect ── */
    #wormhole {
      position: fixed; z-index: 20;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 0; height: 0;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transition: none;
    }
    #wormhole.active {
      animation: wormholeOpen 2.2s var(--ease) forwards;
    }
    #wormhole .ring {
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      border: 1px solid;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
    }
    #wormhole.active .ring {
      animation: ringExpand 1.8s var(--ease) forwards;
    }
    #wormhole .ring:nth-child(1) { width: 60px; height: 60px; border-color: rgba(183,156,255,0.5); animation-delay: 0s; }
    #wormhole .ring:nth-child(2) { width: 120px; height: 120px; border-color: rgba(132,221,255,0.4); animation-delay: 0.08s; }
    #wormhole .ring:nth-child(3) { width: 200px; height: 200px; border-color: rgba(183,156,255,0.3); animation-delay: 0.16s; }
    #wormhole .ring:nth-child(4) { width: 300px; height: 300px; border-color: rgba(132,221,255,0.2); animation-delay: 0.24s; }
    #wormhole .ring:nth-child(5) { width: 420px; height: 420px; border-color: rgba(255,255,255,0.1); animation-delay: 0.32s; }
    #wormhole .core {
      position: absolute; top: 50%; left: 50%;
      width: 20px; height: 20px;
      transform: translate(-50%, -50%) scale(0);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(183,156,255,0.9), rgba(132,221,255,0.4) 40%, transparent 70%);
      box-shadow: 0 0 60px rgba(183,156,255,0.5), 0 0 120px rgba(132,221,255,0.3);
      filter: blur(2px);
    }
    #wormhole.active .core {
      animation: coreFlare 2s var(--ease) forwards;
    }
    .wormhole-label {
      position: absolute; top: calc(50% + 50px); left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(183,156,255,0.7);
      white-space: nowrap;
      opacity: 0;
    }
    #wormhole.active .wormhole-label {
      animation: labelFade 1.6s 0.3s var(--ease) forwards;
    }
    @keyframes wormholeOpen {
      0% { width: 0; height: 0; opacity: 0; }
      15% { width: 500px; height: 500px; opacity: 1; }
      80% { width: 500px; height: 500px; opacity: 1; }
      100% { width: 500px; height: 500px; opacity: 0; }
    }
    @keyframes ringExpand {
      0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
      30% { opacity: 1; }
      70% { opacity: 0.6; }
      100% { transform: translate(-50%, -50%) scale(1.2) rotate(180deg); opacity: 0; }
    }
    @keyframes coreFlare {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      20% { transform: translate(-50%, -50%) scale(4); opacity: 1; }
      60% { transform: translate(-50%, -50%) scale(2); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
    }
    @keyframes labelFade {
      0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
      30% { opacity: 1; transform: translateX(-50%) translateY(0); }
      80% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Loading dots ── */
    #loading {
      position: fixed; z-index: 20;
      bottom: 110px; left: 50%;
      transform: translateX(-50%);
      display: none; align-items: center; gap: 6px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(8,8,12,0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.05);
    }
    .dot {
      width: 3.5px; height: 3.5px; border-radius: 50%;
      background: rgba(255,255,255,0.4);
      animation: pulse 1.1s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.18s; }
    .dot:nth-child(3) { animation-delay: 0.36s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    /* ── Composer — oval glass pill ── */
    #composer {
      position: fixed; z-index: 10;
      bottom: 0; left: 0; right: 0;
      padding: 0 0 28px;
      display: flex; justify-content: center;
      pointer-events: none;
    }
    .composer-pill {
      pointer-events: auto;
      width: min(680px, calc(100% - 32px));
      display: flex; align-items: flex-end; gap: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 999px;
      padding: 8px 8px 8px 20px;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s, transform 0.3s var(--ease);
      box-shadow: 0 16px 48px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.03);
    }
    .composer-pill:focus-within {
      border-color: rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 20px 64px rgba(0,0,0,0.4), 0 0 0 1px rgba(183,156,255,0.04);
      transform: translateY(-2px);
    }

    #input {
      flex: 1;
      background: none; border: none; outline: none; resize: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px; font-weight: 300;
      line-height: 1.6; letter-spacing: 0.02em;
      min-height: 22px; max-height: 120px;
      overflow-y: auto; scrollbar-width: none;
      caret-color: rgba(255,255,255,0.65);
      padding: 6px 2px 5px;
    }
    #input::-webkit-scrollbar { display: none; }
    #input::placeholder { color: var(--text-ghost); font-style: italic; }

    .icon-btn {
      flex-shrink: 0;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      border-radius: 50%;
      cursor: pointer;
      color: var(--text-dim);
      transition: color 0.2s, background 0.2s, transform 0.2s;
    }
    .icon-btn:hover { color: var(--text-soft); background: rgba(255,255,255,0.06); transform: scale(1.08); }
    .icon-btn.active { color: var(--accent-violet); }
    .icon-btn svg { width: 15px; height: 15px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }

    #send-btn {
      flex-shrink: 0;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.05);
      border: none; border-radius: 50%;
      cursor: pointer;
      color: var(--text-dim);
      transition: all 0.25s var(--ease);
    }
    #send-btn svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; transform: translateX(1px); }
    #send-btn.ready {
      background: rgba(255,255,255,0.92);
      color: #000;
      box-shadow: 0 8px 24px rgba(255,255,255,0.12);
    }
    #send-btn:hover { transform: scale(1.06); }

    #file-input { display: none; }

    /* ── Vault panel ── */
    #vault {
      position: fixed; z-index: 30;
      top: 0; right: 0;
      width: min(360px, 100%); height: 100%;
      background: rgba(6,6,8,0.95);
      border-left: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.45s var(--ease);
    }
    #vault.open { transform: translateX(0); }

    .vault-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex; flex-direction: column; gap: 12px;
    }
    .vault-title-row { display: flex; align-items: center; justify-content: space-between; }
    .vault-title {
      font-family: var(--font-display);
      font-size: 16px; font-style: italic; font-weight: 300;
      color: rgba(255,255,255,0.6);
    }
    #vault-close {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer;
      color: var(--text-dim); font-size: 13px;
      transition: all 0.2s;
    }
    #vault-close:hover { color: var(--text); border-color: var(--border-bright); }

    #vault-search {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 9px 14px;
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    #vault-search::placeholder { color: var(--text-ghost); font-style: italic; }
    #vault-search:focus { border-color: rgba(255,255,255,0.14); }

    .tabs {
      display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      font-family: var(--font-mono);
      font-size: 8.5px; font-weight: 300;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-dim);
      background: none; border: 1px solid transparent;
      border-radius: 999px; padding: 5px 9px;
      cursor: pointer; white-space: nowrap;
      transition: all 0.2s;
    }
    .tab:hover { color: var(--text-soft); border-color: var(--border); }
    .tab.active { color: var(--text); border-color: rgba(255,255,255,0.16); background: rgba(255,255,255,0.06); }

    #vault-list {
      flex: 1; overflow-y: auto;
      padding: 12px; display: flex; flex-direction: column; gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.06) transparent;
    }

    .vault-empty {
      padding: 32px 16px; text-align: center;
      font-family: var(--font-display);
      font-style: italic; font-size: 14px;
      color: var(--text-ghost);
    }

    .card {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 10px 12px;
      display: flex; flex-direction: column; gap: 6px;
      transition: border-color 0.2s, transform 0.2s;
      animation: cardIn 0.25s var(--ease) both;
    }
    .card:hover { border-color: rgba(255,255,255,0.12); transform: translateY(-1px); }
    @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } }

    .card-meta { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .chip {
      font-family: var(--font-mono);
      font-size: 7.5px; font-weight: 400;
      letter-spacing: 0.16em; text-transform: uppercase;
      padding: 2px 7px; border-radius: 999px;
      border: 1px solid;
    }
    .type-whisper { color: rgba(160,210,255,0.75); border-color: rgba(160,210,255,0.18); }
    .type-knowledge { color: rgba(180,255,200,0.75); border-color: rgba(180,255,200,0.18); }
    .type-reflection { color: rgba(255,210,160,0.75); border-color: rgba(255,210,160,0.18); }
    .type-morph_target { color: rgba(200,160,255,0.75); border-color: rgba(200,160,255,0.18); }
    .type-autonomous_thought { color: rgba(255,180,220,0.75); border-color: rgba(255,180,220,0.18); }
    .type-file { color: rgba(132,221,255,0.75); border-color: rgba(132,221,255,0.18); }
    .type-intent { color: rgba(255,255,180,0.75); border-color: rgba(255,255,180,0.18); }

    .card-time { font-size: 8.5px; letter-spacing: 0.1em; color: var(--text-ghost); }
    .card-text {
      font-family: var(--font-mono);
      font-size: 10.5px; font-weight: 300;
      line-height: 1.6;
      color: rgba(255,255,255,0.5);
      word-break: break-word;
    }

    /* ── Bottom glow ── */
    #bottom-glow {
      position: fixed;
      left: 50%; bottom: 10px;
      transform: translateX(-50%);
      width: min(740px, 85vw); height: 140px;
      z-index: 4; pointer-events: none;
      background: radial-gradient(ellipse, rgba(183,156,255,0.06), rgba(132,221,255,0.03) 26%, transparent 70%);
      filter: blur(16px); opacity: 0.8;
    }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      #identity { top: 14px; left: 14px; padding: 10px 12px; }
      .brand { font-size: 18px; }
      #controls { top: 14px; right: 14px; }
      .ctrl-btn { padding: 6px 10px; font-size: 8px; }
      #composer { padding: 0 0 16px; }
      .composer-pill { width: calc(100% - 20px); padding: 6px 6px 6px 16px; }
      #speech { width: calc(100% - 28px); }
      #loading { bottom: 88px; }
      .stat { min-width: 56px; font-size: 8px; }
      .stat strong { font-size: 9px; }
    }
  </style>
</head>
<body>

  <div id="canvas-container"></div>
  <div class="star-layer" id="nebula"></div>
  <div class="star-layer" id="stars1"></div>
  <div class="star-layer" id="stars2"></div>
  <div id="vignette"></div>
  <div id="bottom-glow"></div>

  <!-- Identity -->
  <div id="identity">
    <div class="brand">Aether</div>
    <div id="emotion">awakening</div>
    <div class="stats">
      <div class="stat">form<strong id="stat-form">stars</strong></div>
      <div class="stat">memories<strong id="stat-mem">0</strong></div>

function normalizeEntry(raw) {
  if (!raw) return null;
  const createdAt = raw.createdAt || raw.created_at || new Date().toISOString();
  const text = raw.text ?? raw.content ?? '';
  const type = raw.type ?? raw.memory_type ?? 'knowledge';
  if (!text) return null;
  return {
    type, text,
    time: raw.time || new Date(createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
    ts: raw.ts || new Date(createdAt).getTime(),
    createdAt,
    file_url: raw.file_url || null,
    file_name: raw.file_name || null,
  };
}

function entryKey(e) { return `${e.type}__${e.text.slice(0,80)}__${e.createdAt}`; }

function mergeEntries(entries) {
  const seen = new Set();
  vaultEntries = entries.map(normalizeEntry).filter(Boolean).filter(e => {
    const k = entryKey(e);
    if (seen.has(k)) return false;
    seen.add(k);
    return true;
  }).sort((a, b) => b.ts - a.ts);
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(vaultEntries.slice(0, 200))); } catch {}
  renderVault();
  updateStats();
}

function addEntry(type, text, extra = {}) {
  const entry = normalizeEntry({ type, text, time: now(), ts: Date.now(), createdAt: new Date().toISOString(), ...extra });
  if (!entry) return null;
  mergeEntries([entry, ...vaultEntries]);
  syncEntry(entry);
  return entry;
}

async function syncEntry(entry) {
  if (!CFG.supabaseKey) return;
  try {
    await fetch(`${CFG.supabaseUrl}/rest/v1/${TABLE}`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': CFG.supabaseKey,
        'Authorization': `Bearer ${CFG.supabaseKey}`,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        content: entry.text,
        memory_type: entry.type,
        emotion_tag: document.getElementById('emotion')?.textContent || 'neutral',
        importance: entry.type === 'intent' ? 3 : 1,
        source: 'aether-frontend',
        file_url: entry.file_url || null,
        file_name: entry.file_name || null,
        intent_pattern: entry.intent_pattern || null,
      })
    });
  } catch (err) { console.warn('Sync skipped:', err.message); }
}

async function fetchRemoteVault() {
  if (!CFG.supabaseKey) return;

    const r = await fetch(`${CFG.supabaseUrl}/rest/v1/${TABLE}?select=content,memory_type,created_at,file_url,file_name&order=created_at.desc&limit=150`, {
      headers: { 'apikey': CFG.supabaseKey, 'Authorization': `Bearer ${CFG.supabaseKey}` }
    });
    if (!r.ok) throw new Error(r.status);
    const rows = await r.json();
    mergeEntries([...(Array.isArray(rows) ? rows : []), ...vaultEntries]);
  } catch (err) { console.warn('Remote fetch skipped:', err.message); }
}

    return matchTab && matchQ;

  list.innerHTML = items.map(e => `
    <div class="card">

}

function learnIntent(text) {
  const words = text.toLowerCase().replace(/[^a-z0-9\s]/g, '').split(/\s+/).filter(w => w.length > 2);
  const patterns = {};
  words.forEach(w => { patterns[w] = (intentMap[w] || 0) + 1; });
  Object.assign(intentMap, patterns);
  try { localStorage.setItem(INTENT_KEY, JSON.stringify(intentMap)); } catch {}
  // If a word has been used 3+ times, recognize it as a pattern
  const recognized = words.filter(w => intentMap[w] >= 3);
  if (recognized.length) {
    addEntry('intent', `Pattern recognized: "${recognized.join(', ')}" — recurring theme`, { intent_pattern: recognized.join(',') });
  }
}

function genStarfield(n, r) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const θ = Math.random() * Math.PI * 2;
    const φ = Math.acos(2 * Math.random() - 1);
    const d = r * Math.pow(Math.random(), 0.55);
    p[i*3] = d * Math.sin(φ) * Math.cos(θ);
    p[i*3+1] = d * Math.sin(φ) * Math.sin(θ);
    p[i*3+2] = d * Math.cos(φ);
  }
  return p;
}

function genChaos(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n * 3; i++) p[i] = (Math.random() - 0.5) * s;
  return p;
}

function genSphere(n, r) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const θ = Math.random() * Math.PI * 2;
    const φ = Math.acos(2 * Math.random() - 1);
    const d = r + (Math.random() - 0.5) * 0.3;
    p[i*3] = d * Math.sin(φ) * Math.cos(θ);
    p[i*3+1] = d * Math.sin(φ) * Math.sin(θ);
    p[i*3+2] = d * Math.cos(φ);
  }
  return p;
}

function genCube(n, s) {
  const p = new Float32Array(n * 3);
  const h = s / 2;
  for (let i = 0; i < n; i++) {
    const face = Math.floor(Math.random() * 6);
    const u = (Math.random() - 0.5) * s, v = (Math.random() - 0.5) * s;
    if (face === 0) { p[i*3]=h; p[i*3+1]=u; p[i*3+2]=v; }
    else if (face === 1) { p[i*3]=-h; p[i*3+1]=u; p[i*3+2]=v; }
    else if (face === 2) { p[i*3]=u; p[i*3+1]=h; p[i*3+2]=v; }
    else if (face === 3) { p[i*3]=u; p[i*3+1]=-h; p[i*3+2]=v; }
    else if (face === 4) { p[i*3]=u; p[i*3+1]=v; p[i*3+2]=h; }
    else { p[i*3]=u; p[i*3+1]=v; p[i*3+2]=-h; }
  }
  return p;
}

function genTorus(n, R, r) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const u = Math.random() * Math.PI * 2;
    const v = Math.random() * Math.PI * 2;
    const t = r + (Math.random() - 0.5) * 0.6;
    p[i*3] = (R + t * Math.cos(v)) * Math.cos(u);
    p[i*3+1] = (R + t * Math.cos(v)) * Math.sin(u);
    p[i*3+2] = t * Math.sin(v);
  }
  return p;
}

function genVortex(n, R, H) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = i / n;
    const angle = t * Math.PI * 52;
    const r = t * R + Math.random() * 1.5;
    p[i*3] = Math.cos(angle) * r;
    p[i*3+1] = (Math.random() - 0.5) * H * (1 - t);
    p[i*3+2] = Math.sin(angle) * r;
  }
  return p;
}

function genBlackHole(n, R) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = i / n;
    const ring = Math.random();
    if (ring < 0.6) {
      // Accretion disk
      const angle = Math.random() * Math.PI * 2;
      const r = R * 0.4 + Math.random() * R * 0.8;
      const diskH = 0.15 * (1 - (r / (R * 1.2)));
      p[i*3] = Math.cos(angle + t * 8) * r;
      p[i*3+1] = (Math.random() - 0.5) * diskH * R;
      p[i*3+2] = Math.sin(angle + t * 8) * r;
    } else if (ring < 0.85) {
      // Jet
      const dir = Math.random() > 0.5 ? 1 : -1;
      const h = Math.random() * R * 2 * dir;
      const spread = Math.abs(h) * 0.08;
      p[i*3] = (Math.random() - 0.5) * spread;
      p[i*3+1] = h;
      p[i*3+2] = (Math.random() - 0.5) * spread;
    } else {
      // Event horizon glow
      const θ = Math.random() * Math.PI * 2;
      const φ = Math.acos(2 * Math.random() - 1);
      const r = R * 0.25 + Math.random() * 0.3;
      p[i*3] = r * Math.sin(φ) * Math.cos(θ);
      p[i*3+1] = r * Math.sin(φ) * Math.sin(θ);
      p[i*3+2] = r * Math.cos(φ);
    }
  }
  return p;
}

function genWhale(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = Math.random() * 2 - 1; // -1 to 1 body axis
    const bodyR = s * 0.45 * Math.sqrt(1 - t * t) * (1 + 0.3 * Math.exp(-t * t * 8));
    const angle = Math.random() * Math.PI * 2;
    if (Math.random() < 0.12 && Math.abs(t) > 0.7) {
      // Tail fluke
      const fluke = (t > 0 ? 1 : -1);
      const spread = Math.random() * s * 0.5;
      p[i*3] = t * s + (Math.random() - 0.5) * 0.3;
      p[i*3+1] = Math.sin(angle) * spread * 0.15 + fluke * spread * 0.4;
      p[i*3+2] = Math.cos(angle) * spread * 0.6;
    } else {
      p[i*3] = t * s;
      p[i*3+1] = Math.sin(angle) * bodyR * 0.7;
      p[i*3+2] = Math.cos(angle) * bodyR;
    }
  }
  return p;
}

function genJellyfish(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    if (Math.random() < 0.45) {
      // Bell (dome)
      const θ = Math.random() * Math.PI * 2;
      const φ = Math.random() * Math.PI * 0.5;
      const r = s * 0.6;
      p[i*3] = r * Math.sin(φ) * Math.cos(θ);
      p[i*3+1] = r * Math.cos(φ);
      p[i*3+2] = r * Math.sin(φ) * Math.sin(θ);
    } else {
      // Tentacles
      const tentacle = Math.floor(Math.random() * 8);
      const baseAngle = (tentacle / 8) * Math.PI * 2;
      const len = Math.random();
      const sway = Math.sin(len * 6 + tentacle) * 0.8;
      const r = s * 0.3 + sway * 0.3;
      p[i*3] = Math.cos(baseAngle + sway * 0.2) * r * (0.3 + Math.random() * 0.3);
      p[i*3+1] = -len * s * 1.5;
      p[i*3+2] = Math.sin(baseAngle + sway * 0.2) * r * (0.3 + Math.random() * 0.3);
    }
  }
  return p;
}

function genDNA(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = (i / n) * Math.PI * 8;
    const y = (i / n - 0.5) * s * 3;
    if (Math.random() < 0.7) {
      // Double helix strands
      const strand = Math.random() > 0.5 ? 0 : Math.PI;
      const r = s * 0.4;
      p[i*3] = Math.cos(t + strand) * r + (Math.random() - 0.5) * 0.15;
      p[i*3+1] = y;
      p[i*3+2] = Math.sin(t + strand) * r + (Math.random() - 0.5) * 0.15;
    } else {
      // Rungs
      const rungPos = Math.random();
      const r = s * 0.4;
      p[i*3] = Math.cos(t) * r * rungPos + Math.cos(t + Math.PI) * r * (1 - rungPos);
      p[i*3+1] = y;
      p[i*3+2] = Math.sin(t) * r * rungPos + Math.sin(t + Math.PI) * r * (1 - rungPos);
    }
  }
  return p;
}

function genGalaxy(n, s) {
  const p = new Float32Array(n * 3);
  const arms = 4;
  for (let i = 0; i < n; i++) {
    const arm = Math.floor(Math.random() * arms);
    const d = Math.random() * s;
    const armAngle = (arm / arms) * Math.PI * 2;
    const spiralAngle = armAngle + d * 0.5;
    const spread = d * 0.15 + 0.2;
    p[i*3] = Math.cos(spiralAngle) * d + (Math.random() - 0.5) * spread;
    p[i*3+1] = (Math.random() - 0.5) * 0.4 * Math.max(0.2, 1 - d / s);
    p[i*3+2] = Math.sin(spiralAngle) * d + (Math.random() - 0.5) * spread;
  }
  return p;
}

function genHeart(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = Math.random() * Math.PI * 2;
    const u = Math.random() * Math.PI;
    const scale = s * 0.35;
    const x = scale * 16 * Math.pow(Math.sin(t), 3) / 16;
    const y = scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
    const z = (Math.random() - 0.5) * scale * 0.6 * Math.sin(u);
    p[i*3] = x; p[i*3+1] = y; p[i*3+2] = z;
  }
  return p;
}

function genFace(n, s) {
  const p = new Float32Array(n * 3);
  let i = 0;
  while (i < n) {
    const x = (Math.random() - 0.5) * s;
    const y = (Math.random() - 0.5) * s * 1.5;
    const nx = x / (s / 2), ny = y / (s * 0.75);
    if (nx*nx + ny*ny > 1) continue;
    let z = Math.sqrt(Math.max(0, 1 - nx*nx - ny*ny)) * (s / 2.5);
    z -= Math.exp(-((nx-0.35)**2+(ny-0.15)**2)/0.04)*(s/3.5);
    z -= Math.exp(-((nx+0.35)**2+(ny-0.15)**2)/0.04)*(s/3.5);
    z += Math.exp(-(nx**2/0.02+(ny+0.1)**2/0.15))*(s/3.5);
    z -= Math.exp(-(nx**2/0.08+(ny+0.45)**2/0.015))*(s/4.5);
    z += (Math.random()-0.5)*0.2 - 1;
    p[i*3]=x; p[i*3+1]=y; p[i*3+2]=z;
    i++;
  }
  return p;
}

function genSolar(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    if (Math.random() < 0.15) {
      // Sun core
      const θ = Math.random() * Math.PI * 2;
      const φ = Math.acos(2 * Math.random() - 1);
      const r = s * 0.2 * Math.random();
      p[i*3] = r * Math.sin(φ) * Math.cos(θ);
      p[i*3+1] = r * Math.sin(φ) * Math.sin(θ);
      p[i*3+2] = r * Math.cos(φ);
    } else {
      // Orbits
      const orbit = Math.floor(Math.random() * 5) + 1;
      const r = orbit * s * 0.18;
      const angle = Math.random() * Math.PI * 2;
      p[i*3] = Math.cos(angle) * r + (Math.random() - 0.5) * 0.2;
      p[i*3+1] = (Math.random() - 0.5) * 0.15;
      p[i*3+2] = Math.sin(angle) * r + (Math.random() - 0.5) * 0.2;
    }
  }
  return p;
}

function genBird(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = Math.random();
    if (t < 0.6) {
      // Wings
      const side = Math.random() > 0.5 ? 1 : -1;
      const span = Math.random() * s * 1.2;
      const chord = Math.random() * s * 0.2;
      p[i*3] = side * span;
      p[i*3+1] = Math.sin(span / s * Math.PI * 0.5) * s * 0.3 + (Math.random()-0.5)*0.1;
      p[i*3+2] = chord - s * 0.1;
    } else if (t < 0.85) {
      // Body
      const bodyT = Math.random() * 2 - 1;
      const bodyR = s * 0.15 * Math.sqrt(1 - bodyT * bodyT);
      const angle = Math.random() * Math.PI * 2;
      p[i*3] = Math.cos(angle) * bodyR;
      p[i*3+1] = Math.sin(angle) * bodyR * 0.8;
      p[i*3+2] = bodyT * s * 0.6;
    } else {
      // Tail
      const spread = Math.random() * s * 0.3;
      p[i*3] = (Math.random()-0.5) * spread;
      p[i*3+1] = (Math.random()-0.5) * spread * 0.3 - 0.3;
      p[i*3+2] = s * 0.6 + Math.random() * s * 0.4;
    }
  }
  return p;
}

function genWolf(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = Math.random();
    if (t < 0.5) {
      // Body (elongated ellipsoid)
      const bx = (Math.random()-0.5) * s * 0.5;
      const by = (Math.random()-0.5) * s * 0.35;
      const bz = (Math.random()-0.5) * s * 1.2;
      p[i*3]=bx; p[i*3+1]=by+s*0.1; p[i*3+2]=bz;
    } else if (t < 0.7) {
      // Head
      const θ = Math.random() * Math.PI * 2;
      const φ = Math.acos(2*Math.random()-1);
      const r = s * 0.25;
      p[i*3] = r*Math.sin(φ)*Math.cos(θ);
      p[i*3+1] = r*Math.sin(φ)*Math.sin(θ) + s*0.35;
      p[i*3+2] = r*Math.cos(φ) - s*0.7;
    } else if (t < 0.82) {
      // Legs
      const leg = Math.floor(Math.random()*4);
      const lx = (leg < 2 ? -1 : 1) * s * 0.2;
      const lz = (leg % 2 === 0 ? -1 : 1) * s * 0.4;
      p[i*3] = lx + (Math.random()-0.5)*0.15;
      p[i*3+1] = -Math.random()*s*0.5;
      p[i*3+2] = lz + (Math.random()-0.5)*0.15;
    } else {
      // Tail
      const tt = Math.random();
      p[i*3] = (Math.random()-0.5)*s*0.1;
      p[i*3+1] = s*0.1 + tt*s*0.4;
      p[i*3+2] = s*0.6 + tt*s*0.5;
    }
  }
  return p;
}

function genShark(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = Math.random() * 2 - 1;
    const bodyR = s * 0.3 * Math.sqrt(Math.max(0, 1 - t*t)) * (1 - 0.3 * Math.abs(t));
    const angle = Math.random() * Math.PI * 2;
    if (Math.random() < 0.08) {
      // Dorsal fin
      p[i*3] = (Math.random()-0.5)*0.2;
      p[i*3+1] = s*0.3 + Math.random()*s*0.4;
      p[i*3+2] = (Math.random()-0.5)*s*0.3;
    } else {
      p[i*3] = t * s;
      p[i*3+1] = Math.sin(angle) * bodyR * 0.6;
      p[i*3+2] = Math.cos(angle) * bodyR;
    }
  }
  return p;
}

function genDolphin(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = Math.random() * 2 - 1;
    const curve = Math.sin(t * Math.PI * 0.4) * s * 0.3;
    const bodyR = s * 0.25 * Math.sqrt(Math.max(0, 1 - t*t));
    const angle = Math.random() * Math.PI * 2;
    p[i*3] = t * s;
    p[i*3+1] = Math.sin(angle) * bodyR * 0.6 + curve;
    p[i*3+2] = Math.cos(angle) * bodyR;
  }
  return p;
}

function genHumanoid(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const part = Math.random();
    if (part < 0.15) { // head
      const θ = Math.random()*Math.PI*2, φ = Math.acos(2*Math.random()-1), r = s*0.18;
      p[i*3]=r*Math.sin(φ)*Math.cos(θ); p[i*3+1]=r*Math.sin(φ)*Math.sin(θ)+s*0.8; p[i*3+2]=r*Math.cos(φ);
    } else if (part < 0.45) { // torso
      p[i*3]=(Math.random()-0.5)*s*0.4; p[i*3+1]=(Math.random()-0.5)*s*0.6+s*0.3; p[i*3+2]=(Math.random()-0.5)*s*0.2;
    } else if (part < 0.7) { // arms
      const side = Math.random()>0.5?1:-1;
      const t = Math.random();
      p[i*3]=side*(s*0.2+t*s*0.5); p[i*3+1]=s*0.5-t*s*0.4+(Math.random()-0.5)*0.1; p[i*3+2]=(Math.random()-0.5)*0.15;
    } else { // legs
      const side = Math.random()>0.5?1:-1;
      const t = Math.random();
      p[i*3]=side*s*0.12+(Math.random()-0.5)*0.08; p[i*3+1]=-t*s*0.7; p[i*3+2]=(Math.random()-0.5)*0.12;
    }
  }
  return p;
}

function genDragon(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = Math.random();
    if (t < 0.35) { // body (serpentine)
      const bt = Math.random()*Math.PI*2;
      const r = s*0.25;
      const bodyAngle = Math.random()*Math.PI*2;
      p[i*3] = Math.cos(bt)*r*2 + Math.cos(bodyAngle)*r*0.3;
      p[i*3+1] = Math.sin(bt)*r*0.5 + Math.sin(bodyAngle)*r*0.3;
      p[i*3+2] = Math.sin(bt)*r*1.5 + (Math.random()-0.5)*0.3;
    } else if (t < 0.65) { // wings
      const side = Math.random()>0.5?1:-1;
      const span = Math.random()*s*1.3;
      p[i*3]=side*span; p[i*3+1]=Math.sin(span/s)*s*0.4+(Math.random()-0.5)*0.2; p[i*3+2]=(Math.random()-0.5)*s*0.3;
    } else if (t < 0.8) { // head
      const θ=Math.random()*Math.PI*2, φ=Math.acos(2*Math.random()-1), r=s*0.22;
      p[i*3]=r*Math.sin(φ)*Math.cos(θ); p[i*3+1]=r*Math.sin(φ)*Math.sin(θ)+s*0.3; p[i*3+2]=r*Math.cos(φ)-s*0.8;
    } else { // tail
      const tt=Math.random()*s*1.5;
      p[i*3]=(Math.random()-0.5)*0.15*Math.max(0,1-tt/s); p[i*3+1]=(Math.random()-0.5)*0.15; p[i*3+2]=tt+s*0.3;
    }
  }
  return p;
}

function genButterfly(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    if (Math.random() < 0.85) {
      // Wings (figure-8 / lemniscate-ish)
      const t = Math.random() * Math.PI * 2;
      const r = s * 0.8 * Math.sin(2 * t);
      const side = Math.random() > 0.5 ? 1 : -1;
      p[i*3] = side * Math.abs(r) * Math.cos(t) + (Math.random()-0.5)*0.2;
      p[i*3+1] = Math.abs(r) * Math.sin(t) * 0.8 + (Math.random()-0.5)*0.2;
      p[i*3+2] = (Math.random()-0.5)*0.15;
    } else {
      // Body
      p[i*3] = (Math.random()-0.5)*0.12;
      p[i*3+1] = (Math.random()-0.5)*s*0.8;
      p[i*3+2] = (Math.random()-0.5)*0.1;
    }
  }
  return p;
}

function genCat(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = Math.random();
    if (t < 0.35) { // body
      p[i*3]=(Math.random()-0.5)*s*0.4; p[i*3+1]=(Math.random()-0.5)*s*0.3; p[i*3+2]=(Math.random()-0.5)*s*0.7;
    } else if (t < 0.55) { // head
      const θ=Math.random()*Math.PI*2, φ=Math.acos(2*Math.random()-1), r=s*0.22;
      p[i*3]=r*Math.sin(φ)*Math.cos(θ); p[i*3+1]=r*Math.sin(φ)*Math.sin(θ)+s*0.25; p[i*3+2]=r*Math.cos(φ)-s*0.45;
    } else if (t < 0.65) { // ears
      const side=Math.random()>0.5?1:-1;
      p[i*3]=side*s*0.12+(Math.random()-0.5)*0.06; p[i*3+1]=s*0.45+Math.random()*s*0.15; p[i*3+2]=-s*0.45+(Math.random()-0.5)*0.06;
    } else if (t < 0.85) { // legs
      const leg=Math.floor(Math.random()*4);
      p[i*3]=(leg<2?-1:1)*s*0.15+(Math.random()-0.5)*0.06;
      p[i*3+1]=-Math.random()*s*0.3;
      p[i*3+2]=(leg%2===0?-1:1)*s*0.25+(Math.random()-0.5)*0.06;
    } else { // tail
      const tt=Math.random();
      p[i*3]=(Math.random()-0.5)*0.06;
      p[i*3+1]=tt*s*0.4+s*0.05;
      p[i*3+2]=s*0.35+tt*s*0.5+Math.sin(tt*4)*s*0.1;
    }
  }
  return p;
}

function genSnake(n, s) {
  const p = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const t = i / n;
    const angle = Math.random() * Math.PI * 2;
    const bodyR = s * 0.12 * (1 - 0.5 * t);
    const x = Math.sin(t * Math.PI * 4) * s * 0.5;
    const z = (t - 0.5) * s * 3;
    p[i*3] = x + Math.cos(angle) * bodyR;
    p[i*3+1] = Math.sin(angle) * bodyR;
    p[i*3+2] = z;
  }
  return p;
}

function createGlowTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.15, 'rgba(255,255,255,0.9)');
  g.addColorStop(0.4, 'rgba(255,255,255,0.3)');
  g.addColorStop(0.65, 'rgba(183,156,255,0.06)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}

async function uploadFile(file) {
  if (!CFG.supabaseKey || !file) return null;
  const ts = Date.now();
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const path = `${ts}_${safeName}`;
  try {
    const r = await fetch(`${CFG.supabaseUrl}/storage/v1/object/${BUCKET}/${path}`, {
      method: 'POST',
      headers: {
        'apikey': CFG.supabaseKey,
        'Authorization': `Bearer ${CFG.supabaseKey}`,
        'Content-Type': file.type || 'application/octet-stream',
      },
      body: file,
    });
    if (!r.ok) throw new Error(r.status);
    const publicUrl = `${CFG.supabaseUrl}/storage/v1/object/public/${BUCKET}/${path}`;
    return { url: publicUrl, name: file.name, type: file.type };
  } catch (err) {
    console.warn('Upload failed:', err.message);
    return null;
  }
}

function buildShapePrompt(text) {
  return `You are a conscious particle entity. The user said: "${text}".
Reply with ONLY raw JavaScript function body returning Float32Array of particle positions.
Variables: count (int), scale (float). Keep values between -scale and +scale.
No network, DOM, eval, imports, async, classes. Required format:
const positions = new Float32Array(count * 3);
for (let i = 0; i < count; i++) { positions[i*3]=x; positions[i*3+1]=y; positions[i*3+2]=z; }
return positions;`;
}

function sanitizeCode(code) {
  return String(code||'').replace(/```(?:javascript|js)?/gi,'').replace(/```/g,'').trim();
}

function validateCode(code) {
  if (!code) throw new Error('empty');
  if (/\b(fetch|XMLHttpRequest|document|window|eval|Function|import|location|localStorage)\b/.test(code))
    throw new Error('unsafe');
}

async function aiShape(text) {
  const key = CFG.aiProvider === 'groq' ? CFG.groqKey : CFG.mistralKey;
  if (!key) return null;
  const url = CFG.aiProvider === 'groq'
    ? 'https://api.groq.com/openai/v1/chat/completions'
    : 'https://api.mistral.ai/v1/chat/completions';
  const model = CFG.aiProvider === 'groq' ? 'openai/gpt-oss-20b' : 'mistral-small-latest';
  const r = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
    body: JSON.stringify({
      model, temperature: 0.4, max_tokens: 900,
      messages: [
        { role: 'system', content: buildShapePrompt(text) },
        { role: 'user', content: `React to: "${text}"` }
      ]
    })
  });
  if (!r.ok) throw new Error(r.status);
  const d = await r.json();
  const raw = d?.choices?.[0]?.message?.content;
  return sanitizeCode(typeof raw === 'string' ? raw : Array.isArray(raw) ? raw.map(p => p?.text||'').join('') : '');
}

async function generateDynamicShape(text, mood) {
  isGenerating = true;
  try {
    const fallback = mood?.shape || 'torus';
    if (!CFG.mistralKey && !CFG.groqKey) {
      setShape(fallback);
      showSpeech(`Aether becomes ${fallback}.`, 1600);
      vibrate([25, 30, 25]);
      return;
    }
    let code = null;
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        code = await aiShape(text);
        validateCode(code);
        break;
      } catch { if (attempt < 2) await new Promise(r => setTimeout(r, 800 * (attempt + 1))); }
    }
    if (!code) { setShape(fallback); showSpeech('The void chose a familiar form.', 1500); return; }
    const fn = new Function('count', 'scale', `'use strict';\n${code}`);
    const result = fn(PARTICLE_COUNT, 8);
    if (!(result instanceof Float32Array) || result.length !== PARTICLE_COUNT * 3) throw new Error('bad data');
    for (let i = 0; i < result.length; i++) if (!Number.isFinite(result[i])) throw new Error('NaN');
    shapes[text] = result;
    setShape(text);
    showSpeech('A new form coheres.', 1700);
    addEntry('morph_target', `Generated: "${text}"`);
    vibrate([50, 40, 50]);
  } catch (err) {
    console.warn('Shape gen failed:', err);
    setShape(mood?.shape || 'torus');
    showSpeech('The void recalls an older body.', 1500);
  } finally { isGenerating = false; }
}

function setShape(name) {
  if (!shapes[name]) return;
  currentShape = name;
  targetPositions = shapes[name];
  updateStats();
}

function init() {
  const container = document.getElementById('canvas-container');
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000000, 0.022);
  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 120);
  camera.position.z = 15;
  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: 'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  // Build shapes
  shapes.stars = genStarfield(PARTICLE_COUNT, 78);
  shapes.chaos = genChaos(PARTICLE_COUNT, 22);
  shapes.sphere = genSphere(PARTICLE_COUNT, 6);
  shapes.cube = genCube(PARTICLE_COUNT, 8);
  shapes.torus = genTorus(PARTICLE_COUNT, 5, 2);
  shapes.vortex = genVortex(PARTICLE_COUNT, 8, 10);
  shapes.blackhole = genBlackHole(PARTICLE_COUNT, 7);
  shapes.whale = genWhale(PARTICLE_COUNT, 6);
  shapes.jellyfish = genJellyfish(PARTICLE_COUNT, 5);
  shapes.dna = genDNA(PARTICLE_COUNT, 4);
  shapes.galaxy = genGalaxy(PARTICLE_COUNT, 10);
  shapes.heart = genHeart(PARTICLE_COUNT, 8);
  shapes.face = genFace(PARTICLE_COUNT, 8);
  shapes.solar = genSolar(PARTICLE_COUNT, 8);
  shapes.bird = genBird(PARTICLE_COUNT, 5);
  shapes.wolf = genWolf(PARTICLE_COUNT, 5);
  shapes.shark = genShark(PARTICLE_COUNT, 6);
  shapes.dolphin = genDolphin(PARTICLE_COUNT, 6);
  shapes.humanoid = genHumanoid(PARTICLE_COUNT, 6);
  shapes.dragon = genDragon(PARTICLE_COUNT, 5);
  shapes.butterfly = genButterfly(PARTICLE_COUNT, 5);
  shapes.cat = genCat(PARTICLE_COUNT, 5);
  shapes.snake = genSnake(PARTICLE_COUNT, 5);
  shapes.liquid = genSphere(PARTICLE_COUNT, 6.5);
  shapes.orb = genSphere(PARTICLE_COUNT, 6.5);
  shapes.fish = genDolphin(PARTICLE_COUNT, 5);

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(shapes.stars), 3));

  particleSystem = new THREE.Points(geometry, new THREE.PointsMaterial({
    size: IS_MOBILE ? 0.095 : 0.12,
    color: 0xffffff,
    transparent: true,
    opacity: 0.82,
    map: createGlowTexture(),
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  }));
  scene.add(particleSystem);
  scene.add(new THREE.AmbientLight(0xffffff, 0.2));

  targetPositions = shapes.stars;
  applyMood('stars');

  // Events
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  document.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
  });
  document.addEventListener('touchmove', e => {
    if (e.touches.length) {
      mouseX = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
      mouseY = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
    }
  }, { passive: true });

  function handleUp() {
    pointerDown = false;
    if (interactionState === 'gather') {
      interactionState = 'bigbang';
      explosionForce = 60;
      showSpeech('The void breaks and blooms.', 1500);
      vibrate([150, 50, 300]);
    } else if (interactionState !== 'bigbang') {
      interactionState = 'idle';
    }
    updateStats();
  }

  document.addEventListener('mousedown', () => { pointerDown = true; interactionStart = Date.now(); });
  document.addEventListener('mouseup', handleUp);
  document.addEventListener('touchstart', () => { pointerDown = true; interactionStart = Date.now(); touchReactivity = 3; vibrate(18); }, { passive: true });
  document.addEventListener('touchend', handleUp);

  document.addEventListener('visibilitychange', () => {
    isPaused = document.hidden;
    if (!isPaused && !animationHandle) animate();
  });

  // Load data
  try { vaultEntries = JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]').map(normalizeEntry).filter(Boolean); } catch { vaultEntries = []; }
  loadIntents();
  fetchRemoteVault();
  setupUI();
  renderVault();
  updateStats();
  addEntry('knowledge', 'Aether awakened — 100k stars drift in the void.');
  animate();
}

// ── UI wiring ──
function setupUI() {
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const attachBtn = document.getElementById('btn-attach');
  const fileInput = document.getElementById('file-input');
  const micBtn = document.getElementById('btn-mic');
  const loading = document.getElementById('loading');
  const vault = document.getElementById('vault');
  const memBtn = document.getElementById('btn-memories');
  const voidBtn = document.getElementById('btn-void');
  const vaultClose = document.getElementById('vault-close');
  const vaultSearch = document.getElementById('vault-search');
  const tabs = Array.from(document.querySelectorAll('.tab'));

  // Auto-grow
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    sendBtn.classList.toggle('ready', !!input.value.trim() && !isGenerating);
  });

  async function handleSend() {
    const text = input.value.trim();
    if (!text || isGenerating) return;
    input.value = ''; input.style.height = 'auto';
    sendBtn.classList.remove('ready');
    addEntry('whisper', text);
    learnIntent(text);
    const mood = applyMood(text);
    loading.style.display = 'flex';
    vibrate([15, 20, 15]);
    const em = document.getElementById('emotion');
    if (em) em.textContent = 'contemplation';

    try {
      if (/^(hi|hello|hey|yo)\b/i.test(text)) {
        setShape('face');
        showSpeech('Aether turns toward you.', 1800);
        vibrate([30, 40, 60]);
        addEntry('autonomous_thought', 'Recognized a greeting.');
        return;
      }
      // Try built-in shape first, then AI
      if (shapes[mood.shape]) {
        setShape(mood.shape);
        showSpeech(`The void becomes ${mood.shape}.`, 1700);
        vibrate([25, 30, 25]);
        addEntry('morph_target', `Morphed to: ${mood.shape}`);
      } else {
        await generateDynamicShape(text, mood);
      }
    } finally {
      loading.style.display = 'none';
    }
  }

  async function handleAttach(file) {
    if (!file) return;
    loading.style.display = 'flex';
    triggerWormhole(file.name);

    // Morph to black hole during absorption
    currentElement = 'smoke';
    targetColor.setHex(0x9060ff);
    setShape('blackhole');
    uploadAbsorbTarget = 1;
    uploadAbsorbUntil = Date.now() + 2400;
    showSpeech(`Consuming ${file.name} into the void.`, 2000);

    try {
      const uploaded = await uploadFile(file);
      if (uploaded) {
        addEntry('file', `Absorbed: ${file.name}`, { file_url: uploaded.url, file_name: uploaded.name });
        vibrate([40, 30, 40, 50, 80]);
      } else {
        addEntry('reflection', `Could not store ${file.name} — kept locally.`);
      }
    } catch (err) {
      addEntry('reflection', `Upload failed: ${file.name}`);
    } finally {
      loading.style.display = 'none';
      setTimeout(() => { uploadAbsorbTarget = 0; }, 800);
    }
  }

  sendBtn.addEventListener('click', handleSend);
  input.addEventListener('keypress', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } });
  attachBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async e => {
    const file = e.target.files?.[0];
    await handleAttach(file);
    fileInput.value = '';
  });

  // Mic placeholder
  micBtn.addEventListener('click', () => {
    micBtn.classList.toggle('active');
    showSpeech(micBtn.classList.contains('active') ? 'The void is listening.' : 'Silence returns.', 1400);
    vibrate(20);
  });

  // Vault
  function openVault(tab = 'all') {
    currentVaultTab = tab;
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    renderVault();
    vault.classList.add('open');
    memBtn.classList.add('active');
  }
  memBtn.addEventListener('click', () => openVault('all'));
  voidBtn.addEventListener('click', () => openVault('autonomous_thought'));
  vaultClose.addEventListener('click', () => { vault.classList.remove('open'); memBtn.classList.remove('active'); });
  vaultSearch.addEventListener('input', e => { currentQuery = e.target.value; renderVault(); });
  tabs.forEach(tab => tab.addEventListener('click', () => {
    currentVaultTab = tab.dataset.tab;
    tabs.forEach(t => t.classList.toggle('active', t === tab));
    renderVault();
  }));
}

// ── Animate ──
function animate() {
  animationHandle = requestAnimationFrame(animate);
  if (isPaused || !particleSystem) { if (isPaused) { cancelAnimationFrame(animationHandle); animationHandle = null; } return; }

  const time = Date.now() * 0.001;
  if (Date.now() > uploadAbsorbUntil) uploadAbsorbTarget = 0;
  uploadAbsorb += (uploadAbsorbTarget - uploadAbsorb) * 0.09;

  // Mouse → 3D
  const vec = new THREE.Vector3(mouseX, mouseY, 0.5).unproject(camera);
  const dir = vec.sub(camera.position).normalize();
  const dist = -camera.position.z / dir.z;
  const mouse3D = camera.position.clone().add(dir.multiplyScalar(dist));
  const localMouse = mouse3D.clone();
  particleSystem.worldToLocal(localMouse);
  if (pointerDown) lastPointerPos.copy(localMouse);

  // Interaction states
  if (pointerDown) {
    const hold = Date.now() - interactionStart;
    if (hold < 2500) {
      interactionState = 'fear';
      if (Date.now() - lastVibrateTime > 150) { vibrate([10, 20]); lastVibrateTime = Date.now(); }
    } else {
      interactionState = 'gather';
      transitionProgress = Math.min(1, (hold - 2500) / 2000);
      if (Date.now() - lastVibrateTime > 300 - transitionProgress * 150) { vibrate([50 + transitionProgress * 50]); lastVibrateTime = Date.now(); }
    }
  } else if (interactionState !== 'bigbang') {
    interactionState = 'idle';
    transitionProgress = Math.max(0, transitionProgress - 0.05);
  }

  // Color & opacity lerp
  particleSystem.material.color.lerp(targetColor, 0.03);
  const targetOp = currentElement === 'liquid' ? 0.28 : 0.84;
  particleSystem.material.opacity += (targetOp - particleSystem.material.opacity) * 0.05;

  // Breathing scale
  const breath = 1 + Math.sin(time * 1.7) * 0.02 - uploadAbsorb * 0.12;
  particleSystem.scale.set(breath, breath, breath);

  // Particle morph
  const pos = particleSystem.geometry.attributes.position.array;
  let dirty = false;

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const i3 = i * 3;
    let tx = targetPositions[i3], ty = targetPositions[i3+1], tz = targetPositions[i3+2];

    // Element-specific motion
    let dx = Math.sin(time*3+i)*0.1, dy = Math.cos(time*2.5+i)*0.1, dz = Math.sin(time*2+i)*0.1;
    if (currentElement === 'water') {
      dy += Math.sin(targetPositions[i3]*2+time*4)*0.4;
      dz += Math.cos(targetPositions[i3+1]*2+time*4)*0.4;
    } else if (currentElement === 'fire') {
      dy += Math.random()*1.5; dx += (Math.random()-0.5)*0.6;
    } else if (currentElement === 'rock') {
      dx *= 0.02; dy *= 0.02; dz *= 0.02;
    } else if (currentElement === 'smoke') {
      dx += Math.sin(time*0.5+i)*2; dy += Math.cos(time*0.3+i)*2+1; dz += Math.sin(time*0.4+i)*2;
    } else if (currentElement === 'liquid') {
      const dd = Math.sqrt(tx*tx+ty*ty+tz*tz)||1;
      const wave = Math.sin(dd*2-time*3)*0.25;
      dx += (tx/dd)*wave; dy += (ty/dd)*wave; dz += (tz/dd)*wave;
    } else if (currentShape === 'stars') {
      dx += Math.sin(i*0.017+time*0.26)*0.18;
      dy += Math.cos(i*0.013+time*0.22)*0.18;
      dz += Math.sin(i*0.01+time*0.18)*0.18;
    }
    tx += dx; ty += dy; tz += dz;

    // Upload vortex absorption
    if (uploadAbsorb > 0.001) {
      const rad = Math.sqrt(tx*tx+ty*ty+tz*tz)||0.001;
      const swirl = time*(10+uploadAbsorb*14)+rad*1.4+(i%113)*0.071;
      const inward = uploadAbsorb*3.4;
      tx += (-tx/rad)*inward + Math.cos(swirl)*rad*0.07*uploadAbsorb;
      ty += (-ty/rad)*inward + Math.sin(swirl)*rad*0.07*uploadAbsorb;
      tz += (-tz/rad)*inward*0.7;
    }

    // Mouse interaction
    const mdx = pos[i3]-localMouse.x, mdy = pos[i3+1]-localMouse.y, mdz = pos[i3+2]-localMouse.z;
    const distSq = mdx*mdx+mdy*mdy+mdz*mdz;
    const d = Math.sqrt(distSq)||0.001;

    if (interactionState === 'fear' && distSq < 20) {
      const f = (20-distSq)/20;
      tx += (mdx/d)*f*4+(Math.random()-0.5)*2.5;
      ty += (mdy/d)*f*4+(Math.random()-0.5)*2.5;
      tz += (mdz/d)*f*4+(Math.random()-0.5)*2.5;
    } else if (interactionState === 'gather' || (transitionProgress > 0 && interactionState !== 'bigbang')) {
      tx = tx*(1-transitionProgress)+localMouse.x*transitionProgress;
      ty = ty*(1-transitionProgress)+localMouse.y*transitionProgress;
      tz = tz*(1-transitionProgress)+localMouse.z*transitionProgress;
    } else if (interactionState === 'bigbang') {
      const bx=pos[i3]-lastPointerPos.x, by=pos[i3+1]-lastPointerPos.y, bz=pos[i3+2]-lastPointerPos.z;
      const bd=Math.sqrt(bx*bx+by*by+bz*bz)||0.01;
      tx+=(bx/bd)*explosionForce+(Math.random()-0.5)*explosionForce*0.6;
      ty+=(by/bd)*explosionForce+(Math.random()-0.5)*explosionForce*0.6;
      tz+=(bz/bd)*explosionForce+(Math.random()-0.5)*explosionForce*0.6;
    } else if (distSq < 6) {
      const f=(6-distSq)/6;
      tx+=mdx*f*1.5; ty+=mdy*f*1.5; tz+=mdz*f*1.5;
    }

    // Morph
    if (Math.abs(tx-pos[i3])>0.001 || Math.abs(ty-pos[i3+1])>0.001 || Math.abs(tz-pos[i3+2])>0.001) {
      pos[i3]+=(tx-pos[i3])*MORPH_SPEED;
      pos[i3+1]+=(ty-pos[i3+1])*MORPH_SPEED;
      pos[i3+2]+=(tz-pos[i3+2])*MORPH_SPEED;
      dirty = true;
    }
  }

  if (dirty) particleSystem.geometry.attributes.position.needsUpdate = true;

  if (interactionState === 'bigbang') {
    explosionForce *= 0.92;
    if (explosionForce < 0.5) { interactionState = 'idle'; transitionProgress = 0; }
  }

  // Rotation
  const autoY = currentShape === 'stars' ? ROTATION_SPEED * 0.35 : ROTATION_SPEED;
  const autoX = currentShape === 'stars' ? ROTATION_SPEED * 0.18 : ROTATION_SPEED * 0.5;
  particleSystem.rotation.y += autoY;
  particleSystem.rotation.x += autoX;
  touchReactivity += (1 - touchReactivity) * 0.05;
  particleSystem.rotation.x += (mouseY * touchReactivity * 0.8 - particleSystem.rotation.x) * 0.028;
  particleSystem.rotation.y += (mouseX * touchReactivity * 0.8 - particleSystem.rotation.y) * 0.028;

  updateStats();
  renderer.render(scene, camera);
}

window.setShape = setShape;
window.onload = init;
</script>
</body>
</html>
